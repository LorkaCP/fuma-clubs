  <script>
    // --- 1. CONFIGURATION ---
    const GLOBAL_DATA_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQmb8QyRSXiEG9O7vApX3Xy1elzQ5NpB5DYLMmwdJcyhhB4uMmrRlPWmrZVR4W8AlzKxqpavcLYGEK8/pub?gid=1610453677&single=true&output=csv";
    const PLAYERS_DATA_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQmb8QyRSXiEG9O7vApX3Xy1elzQ5NpB5DYLMmwdJcyhhB4uMmrRlPWmrZVR4W8AlzKxqpavcLYGEK8/pub?gid=420142588&single=true&output=csv";
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzq1aeIc_6vfcG_37LaY0w9cfdDP1RIodp2FiAR39Fz3u_d8NlYFxjQJ08SfimZ2fNK0Q/exec?action=match";
      let currentPlayersData = []; // Pour stocker les données fusionnées

    const CLUB_ALIASES = {
        "fuma y pasa": "f y pasa",
        "croser fc": "croser fc",
        "fuma clubs a": "fuma clubs a",
        
    };

    const params = new URLSearchParams(window.location.search);
    const homeName = params.get('home') || "";
    const awayName = params.get('away') || "";
    const currentGid = params.get('gid');

    document.getElementById('name-home').innerText = homeName;
    document.getElementById('name-away').innerText = awayName;


// --- CONFIGURATION DISCORD ---
const DISCORD_CLIENT_ID = "1473807551329079408"; // À remplacer
const REDIRECT_URI = window.location.href.split('?')[0]; // Redirige sur la même page

function loginWithDiscord() {
    const url = `https://discord.com/api/oauth2/authorize?client_id=${DISCORD_CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify`;
    window.location.href = url;
}

async function checkAuth() {
    const fragment = new URLSearchParams(window.location.hash.slice(1));
    let accessToken = fragment.get('access_token') || localStorage.getItem('discord_token');

    if (accessToken) {
        localStorage.setItem('discord_token', accessToken);
        window.location.hash = ""; // Nettoie l'URL
        
        try {
            const response = await fetch('https://discord.com/api/users/@me', {
                headers: { Authorization: `Bearer ${accessToken}` }
            });
            const user = await response.json();
            
            if (user.id) {
                // On vérifie maintenant si cet ID existe dans ta DATABASE Google Sheet
                verifyUserRole(user.id, user.username);
            }
        } catch (err) {
            console.error("Erreur Discord:", err);
            logout();
        }
    } else {
        document.getElementById('btn-submit').disabled = true;
        document.getElementById('btn-submit').style.opacity = "0.5";
        document.getElementById('btn-submit').innerText = "Veuillez vous connecter";
    }
}

async function verifyUserRole(discordId, username) {
    const scriptId = "VOTRE_ID_SCRIPT"; 
    const url = `https://script.google.com/macros/s/${scriptId}/exec?discord_id=${discordId}`;
    const authStatusEl = document.getElementById('auth-status');
    const submitBtn = document.getElementById('btn-submit');

    try {
        const response = await fetch(url);
        const dbUser = await response.json();
        
        // CONDITION DE RESTRICTION PAR RÔLE
        const ROLE_AUTORISE = "Admin"; // Changez ceci par le rôle souhaité

        if (dbUser.result === "success" && dbUser.role === ROLE_AUTORISE) {
            // L'utilisateur est reconnu ET a le bon rôle
            localStorage.setItem('discord_id', discordId);
            
            authStatusEl.innerHTML = `<span style="color: #d4af37;">✅ Bonjour ${username}, accès autorisé (Rôle: ${dbUser.role})</span>`;
            submitBtn.disabled = false;
            submitBtn.style.opacity = "1";
        } 
        else if (dbUser.result === "success" && dbUser.role !== ROLE_AUTORISE) {
            // L'utilisateur est reconnu mais n'a PAS le bon rôle
            authStatusEl.innerHTML = `<span style="color: #ff4444;">🚫 Accès refusé : Votre rôle (${dbUser.role || 'Joueur'}) ne permet pas de poster des rapports.</span>`;
            submitBtn.disabled = true;
            submitBtn.style.opacity = "0.3";
        }
        else {
            // Utilisateur non trouvé dans la base
            authStatusEl.innerHTML = `<span style="color: #ff4444;">❌ Utilisateur inconnu dans la base FUMA.</span>`;
            submitBtn.disabled = true;
        }
    } catch (e) {
        console.error(e);
    }
}

function logout() {
    localStorage.removeItem('discord_token');
    window.location.href = REDIRECT_URI;
}

// Appeler checkAuth au chargement
window.addEventListener('DOMContentLoaded', checkAuth);


      
    // --- 2. NORMALISATION ---
    function normalizeName(name) {
        if (!name) return "";
        let n = name.toLowerCase().trim();
        if (CLUB_ALIASES[n]) n = CLUB_ALIASES[n];
        return n.normalize("NFD").replace(/[\u0300-\u036f]/g, "")
                .replace(/\b(fc|sc|club|as|ol|de)\b/gi, "")
                .replace(/[^a-z0-9]/g, "")
                .trim();
    }

    // --- 3. RECHERCHE DES MATCHS ---
    async function init() {
        const statusEl = document.getElementById('loading-status');
        try {
            const response = await fetch(GLOBAL_DATA_URL);
            const data = await response.text();
            const rows = data.split('\n').map(r => r.split(','));
            
            const normHome = normalizeName(homeName);
            const normAway = normalizeName(awayName);

            const matches = rows.filter(r => {
                const rHome = normalizeName(r[1]);
                const rAway = normalizeName(r[2]);
                return (rHome === normHome && rAway === normAway) || 
                       (rHome === normAway && rAway === normHome);
            });

            if (matches.length > 0) {
                statusEl.innerHTML = `<i class="fas fa-check"></i> ${matches.length} mi-temps trouvées`;
                displayMatchSelector(matches);
            } else {
                statusEl.innerHTML = '<i class="fas fa-exclamation-circle"></i> Aucun match trouvé.';
            }
        } catch (err) {
            statusEl.innerHTML = "Erreur de chargement.";
            console.error(err);
        }
    }

    function displayMatchSelector(matches) {
        const container = document.getElementById('match-selector-container');
        window.tempMatchesData = matches;
        let html = '<div style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px;">';
        
        matches.forEach((m, i) => {
            html += `
                <label style="display: flex; align-items: center; background: #252525; border: 1px solid #444; padding: 12px; cursor: pointer; border-radius: 6px; color: #fff;">
                    <input type="checkbox" class="match-checkbox" value="${i}" style="width: 20px; height: 20px; margin-right: 15px;">
                    <span><i class="far fa-calendar-alt"></i> ${m[0]} | <strong>${m[1]}</strong> ${m[4]}-${m[5]} <strong>${m[2]}</strong></span>
                </label>`;
        });

        html += `
            <button type="button" onclick="processSelectedMatches()" 
                    style="background: #d4af37; color: #000; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: 800; text-transform: uppercase; width:100%;">
                Fusionner les 2 mi-temps sélectionnées
            </button>
        </div>`;
        container.innerHTML = html;
    }

    // --- 4. LOGIQUE DE FUSION (EQUIPE + JOUEURS) ---
    window.processSelectedMatches = async function() {
        const selectedCheckboxes = document.querySelectorAll('.match-checkbox:checked');
        
        if (selectedCheckboxes.length !== 2) {
            alert("Veuillez sélectionner exactement 2 matchs pour fusionner les mi-temps.");
            return;
        }

        const m1 = window.tempMatchesData[selectedCheckboxes[0].value];
        const m2 = window.tempMatchesData[selectedCheckboxes[1].value];
        
        const isRev1 = (normalizeName(m1[1]) === normalizeName(awayName));
        const isRev2 = (normalizeName(m2[1]) === normalizeName(awayName));

        const sum = (colH, colA, isR1, isR2) => (parseInt(m1[isR1 ? colA : colH]) || 0) + (parseInt(m2[isR2 ? colA : colH]) || 0);
        const avg = (colH, colA, isR1, isR2) => Math.round(((parseInt(m1[isR1 ? colA : colH]) || 0) + (parseInt(m2[isR2 ? colA : colH]) || 0)) / 2);

        // Stats Equipe
        document.getElementById('in-sh').value = sum(4, 5, isRev1, isRev2); 
        document.getElementById('in-sa').value = sum(5, 4, isRev1, isRev2); 
        document.getElementById('in-posH').value = avg(8, 9, isRev1, isRev2); 
        document.getElementById('in-posA').value = avg(9, 8, isRev1, isRev2);
        document.getElementById('in-shoH').value = sum(10, 11, isRev1, isRev2); 
        document.getElementById('in-shoA').value = sum(11, 10, isRev1, isRev2);
        document.getElementById('in-pasAttH').value = sum(12, 13, isRev1, isRev2); 
        document.getElementById('in-pasAttA').value = sum(13, 12, isRev1, isRev2);
        document.getElementById('in-accH').value = avg(14, 15, isRev1, isRev2); 
        document.getElementById('in-accA').value = avg(15, 14, isRev1, isRev2);
        
        // Tacles Equipe
        document.getElementById('in-tacAttH').value = sum(16, 17, isRev1, isRev2); 
        document.getElementById('in-tacAttA').value = sum(17, 16, isRev1, isRev2);
        document.getElementById('in-tacMadH').value = sum(18, 19, isRev1, isRev2); 
        document.getElementById('in-tacMadA').value = sum(19, 18, isRev1, isRev2);

        document.getElementById('in-redH').value = sum(20, 21, isRev1, isRev2); 
        document.getElementById('in-redA').value = sum(21, 20, isRev1, isRev2);

        // Buteurs avec " | "
        const bH1 = (m1[isRev1 ? 7 : 6] || "").trim();
        const bH2 = (m2[isRev2 ? 7 : 6] || "").trim();
        const bA1 = (m1[isRev1 ? 6 : 7] || "").trim();
        const bA2 = (m2[isRev2 ? 6 : 7] || "").trim();

        document.getElementById('in-stH').value = [bH1, bH2].filter(x => x !== "").join(" | ");
        document.getElementById('in-stA').value = [bA1, bA2].filter(x => x !== "").join(" | ");

        // Fusion Joueurs
        await fetchPlayersForTwoMatches(m1[3].trim(), m2[3].trim());
        alert("Fusion terminée ! Vérifiez les statistiques avant de valider.");
    };

    async function fetchPlayersForTwoMatches(id1, id2) {
    try {
        const response = await fetch(PLAYERS_DATA_URL);
        const csvText = await response.text();
        const rows = csvText.split('\n').map(row => row.split(','));
        const playersMap = {};

        rows.forEach(r => {
            const mId = r[0] ? r[0].trim() : "";
            if (mId === id1 || mId === id2) {
                const pName = r[1]; // Nom du joueur
                
                if (!playersMap[pName]) {
                    // Premier passage : on initialise l'entrée avec une copie de la ligne
                    playersMap[pName] = [...r];
                    
                    // Conversion des colonnes numériques pour permettre les calculs
                    // 5:Note, 6:Buts, 7:Assists, 8:Tirs, 9:PassesT, 10:PassesR, 12:TaclesT, 13:TaclesR, 15:Rouge, 16:Motm
                    [5, 6, 7, 8, 9, 10, 12, 13, 15, 16].forEach(idx => {
                        playersMap[pName][idx] = parseFloat(r[idx]) || 0;
                    });
                } else {
                    // Deuxième passage : on additionne les statistiques
                    [6, 7, 8, 9, 10, 12, 13, 15, 16].forEach(idx => {
                        playersMap[pName][idx] += (parseFloat(r[idx]) || 0);
                    });
                    
                    // Moyenne de la note sur les deux mi-temps
                    playersMap[pName][5] = parseFloat(((playersMap[pName][5] + (parseFloat(r[5]) || 0)) / 2).toFixed(1));
                }
            }
        });

        const finalPlayers = Object.values(playersMap);

        // --- CALCULS FINAUX ET MOTM ---
        let bestNote = 0;
        let motmName = "";

        finalPlayers.forEach(p => {
            // Recalcul des % de précision après fusion
            p[11] = p[9] > 0 ? Math.round((p[10] / p[9]) * 100) : 0;   // % Passes
            p[14] = p[12] > 0 ? Math.round((p[13] / p[12]) * 100) : 0; // % Tacles

            // Détection du meilleur joueur (MOTM automatique basé sur la note)
            const playerNote = p[5];
            if (playerNote > bestNote) {
                bestNote = playerNote;
                motmName = p[1];
            }
        });

        // Injection automatique du nom du MOTM dans le champ du formulaire
        if (motmName) {
            document.getElementById('in-motm').value = motmName;
        }

        // Mise à jour de la variable globale et affichage
        currentPlayersData = finalPlayers;
        displayPlayers(currentPlayersData);

    } catch (err) {
        console.error("Erreur lors de la récupération et fusion des joueurs:", err);
        alert("Erreur lors de la fusion des joueurs. Vérifiez la console.");
    }
}
    function displayPlayers(players) {
    const homeList = document.querySelector('#home-players-list .list');
    const awayList = document.querySelector('#away-players-list .list');
    
    // Modification des titres H3 pour afficher les vrais noms d'équipes
    document.querySelector('#home-players-list h3').innerText = `Joueurs (${homeName})`;
    document.querySelector('#away-players-list h3').innerText = `Joueurs (${awayName})`;

    homeList.innerHTML = ""; 
    awayList.innerHTML = "";

    const normalizedHomeMatchName = normalizeName(homeName);

    players.forEach(p => {
        const playerTeamName = p[2] ? p[2].trim() : "";
        
        const playerHtml = `
            <div class="player-stat-row">
                <span class="player-name-header">
                    ${p[1]} <span style="color: #888; font-size: 0.7rem;">[${p[3] || 'N/A'}]</span> ${p[16] == 1 ? '⭐' : ''}
                </span>
                <div class="stats-grid">
                    <div class="stat-item">Note: <strong>${p[5]}</strong></div>
                    <div class="stat-item">Buts: ${p[6]}</div>
                    <div class="stat-item">Assists: ${p[7]}</div>
                    <div class="stat-item">Tirs: ${p[8]}</div>
                    <div class="stat-item">Passes: ${p[10]}/${p[9]} (${p[11]}%)</div>
                    <div class="stat-item">Tacles: ${p[13]}/${p[12]} (${p[14]}%)</div>
                </div>
            </div>`;

        if (normalizeName(playerTeamName) === normalizedHomeMatchName) {
            homeList.innerHTML += playerHtml;
        } else {
            awayList.innerHTML += playerHtml;
        }
    });
}

    // --- 5. ENVOI FINAL ---
    document.getElementById('match-report-form').onsubmit = async (e) => {
    e.preventDefault();
    
    // 1. Vérification de sécurité locale avant l'envoi
    const discordId = localStorage.getItem('discord_id');
    if (!discordId) {
        alert("Erreur : Vous devez être connecté via Discord pour soumettre un rapport.");
        return;
    }

    const btn = document.getElementById('btn-submit');
    const originalBtnText = btn.innerText;
    
    // 2. État de chargement
    btn.innerText = "ENREGISTREMENT EN COURS...";
    btn.disabled = true;
    btn.style.opacity = "0.7";

    // 3. Préparation des données du formulaire
    const formData = new FormData(e.target);
    const data = Object.fromEntries(formData.entries());
    
    // 4. Enrichissement des données avec les variables de session et joueurs
    data.home = homeName; // Variable définie au début du script
    data.away = awayName; // Variable définie au début du script
    data.gid = currentGid; // ID de la compétition/match
    data.submittedBy = discordId; // ID Discord de l'auteur pour traçabilité
    data.players = currentPlayersData; // Tableau des joueurs fusionnés

    try {
        // 5. Envoi vers Google Apps Script (Action: match)
        // Note: On utilise mode 'no-cors' comme dans ton script original
        const response = await fetch(APPS_SCRIPT_URL, { 
            method: 'POST', 
            mode: 'no-cors', 
            body: JSON.stringify(data) 
        });

        // 6. Succès et Redirection
        alert("✅ Rapport et statistiques joueurs enregistrés avec succès !");
        
        // Redirection vers la page d'info match avec les paramètres
        const redirectUrl = `info-match.html?home=${encodeURIComponent(homeName)}&away=${encodeURIComponent(awayName)}&gid=${currentGid}`;
        window.location.href = redirectUrl;

    } catch (error) {
        // 7. Gestion des erreurs
        console.error("Erreur lors de l'envoi :", error);
        alert("❌ Une erreur est survenue lors de l'enregistrement. Veuillez réessayer.");
        
        // Réinitialisation du bouton en cas d'échec
        btn.disabled = false;
        btn.innerText = originalBtnText;
        btn.style.opacity = "1";
    }
};
