<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">

</head>
<body>
    <div class="fuma-container">
        <header style="text-align: center; padding: 30px 0;">
            <h1 style="color: var(--fuma-primary); font-weight: 800; letter-spacing: 2px; margin: 0;">DATA REPORT SYSTEM</h1>
            <p style="color: var(--fuma-text-dim); font-size: 0.9rem;">Enregistrement des statistiques officielles FUMA</p>

        <div id="import-section" style="max-width: 800px; margin: 0 auto 30px auto; padding: 0 20px;">
            <div id="loading-status" style="text-align: center; margin-bottom: 10px; font-weight: 600;">
                <i class="fas fa-spinner fa-spin"></i> Recherche de matchs existants...
            </div>
            <div id="match-selector-container">
                </div>
        </div>

        <form id="match-report-form" style="max-width: 900px; margin: 0 auto; padding-bottom: 100px;">
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 0 20px;">
                
                <div class="report-card" style="background: #151515; border: 1px solid #333; border-radius: 15px; padding: 20px;">
                    <h2 id="name-home" style="color: var(--fuma-primary); text-align: center; border-bottom: 1px solid #333; padding-bottom: 10px;">HOME</h2>
                    
                    <label>Score Final</label>
                    <input type="number" name="sh" id="in-sh" placeholder="0" required>

                    <label>Buteurs (Noms / Minutes)</label>
                    <input type="text" name="stH" id="in-stH" placeholder="ex: Messi 12', 45'">

                    <label>Possession %</label>
                    <input type="number" name="posH" id="in-posH" placeholder="50">

                    <label>Tirs Totaux</label>
                    <input type="number" name="shoH" id="in-shoH" placeholder="0">

                    <label>Passes Tentées</label>
                    <input type="number" name="pasAttH" id="in-pasAttH" placeholder="0">

                    <label>Précision des Passes %</label>
                    <input type="number" name="accH" id="in-accH" placeholder="0">

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <div>
                            <label>Tacles réussis</label>
                            <input type="number" name="tacMadH" id="in-tacMadH" placeholder="0">
                        </div>
                        <div>
                            <label>Tacles tentés</label>
                            <input type="number" name="tacAttH" id="in-tacAttH" placeholder="0">
                        </div>
                    </div>

                    <label>Cartons Rouges</label>
                    <input type="number" name="redH" id="in-redH" value="0">
                </div>

                <div class="report-card" style="background: #151515; border: 1px solid #333; border-radius: 15px; padding: 20px;">
                    <h2 id="name-away" style="color: var(--fuma-primary); text-align: center; border-bottom: 1px solid #333; padding-bottom: 10px;">AWAY</h2>
                    
                    <label>Score Final</label>
                    <input type="number" name="sa" id="in-sa" placeholder="0" required>

                    <label>Buteurs (Noms / Minutes)</label>
                    <input type="text" name="stA" id="in-stA" placeholder="ex: Haaland 88'">

                    <label>Possession %</label>
                    <input type="number" name="posA" id="in-posA" placeholder="50">

                    <label>Tirs Totaux</label>
                    <input type="number" name="shoA" id="in-shoA" placeholder="0">

                    <label>Passes Tentées</label>
                    <input type="number" name="pasAttA" id="in-pasAttA" placeholder="0">

                    <label>Précision des Passes %</label>
                    <input type="number" name="accA" id="in-accA" placeholder="0">

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <div>
                            <label>Tacles réussis</label>
                            <input type="number" name="tacMadA" id="in-tacMadA" placeholder="0">
                        </div>
                        <div>
                            <label>Tacles tentés</label>
                            <input type="number" name="tacAttA" id="in-tacAttA" placeholder="0">
                        </div>
                    </div>

                    <label>Cartons Rouges</label>
                    <input type="number" name="redA" id="in-redA" value="0">
                </div>
            </div>

            <div style="padding: 20px;">
                <div style="background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid var(--fuma-primary);">
                    <label style="margin-top: 0;">MAN OF THE MATCH (NOM COMPLET)</label>
                    <input type="text" name="motm" id="in-motm" placeholder="Nom du joueur">
                </div>
            </div>

            <div id="players-stats-container" style="margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 0 20px;">
    <div id="home-players-list" class="report-card"><h3>Joueurs (Home)</h3><div class="list"></div></div>
    <div id="away-players-list" class="report-card"><h3>Joueurs (Away)</h3><div class="list"></div></div>
</div>

            <div style="padding: 0 20px;">
                <button type="submit" id="btn-submit" class="submit-button" 
                        style="width: 100%; padding: 20px; background: var(--fuma-primary); color: #000; border: none; border-radius: 10px; font-weight: 800; font-size: 1.1rem; cursor: pointer; text-transform: uppercase; transition: 0.3s;">
                    <i class="fas fa-cloud-upload-alt"></i> Valider et enregistrer le match
                </button>
            </div>

        </form>
    </div>

    <style>
        label {
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            font-size: 0.75rem;
            color: var(--fuma-text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        input {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: var(--fuma-primary);
        }
        .submit-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
        }
        .select-match-btn:hover {
            border-color: var(--fuma-primary) !important;
            background: #303030 !important;
        }

        .player-stat-row {
    font-size: 0.75rem;
    border-bottom: 1px solid #333;
    padding: 8px 0;
    color: #eee;
}
.player-name-header {
    color: #d4af37;
    font-weight: bold;
    display: block;
    margin-bottom: 3px;
}
.stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 5px;
    color: #bbb;
}
.stat-item {
    font-size: 0.7rem;
}
    </style>
  <script>
    // --- 1. CONFIGURATION ---
    const GLOBAL_DATA_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQmb8QyRSXiEG9O7vApX3Xy1elzQ5NpB5DYLMmwdJcyhhB4uMmrRlPWmrZVR4W8AlzKxqpavcLYGEK8/pub?gid=1610453677&single=true&output=csv";
    const PLAYERS_DATA_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQmb8QyRSXiEG9O7vApX3Xy1elzQ5NpB5DYLMmwdJcyhhB4uMmrRlPWmrZVR4W8AlzKxqpavcLYGEK8/pub?gid=420142588&single=true&output=csv";
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyI-SMPkKDGoGg48Bke8ELycDUbgLXGgwmn83Ydz8ipfd7NO0gWYhwAR4t-kuF2wfUB/exec";

    const CLUB_ALIASES = {
        "fuma y pasa": "f y pasa",
        "croser fc": "croser fc",
        "fuma clubs a": "fuma clubs a",
        "ac titans": "ac titans"
    };

    const params = new URLSearchParams(window.location.search);
    const homeName = params.get('home') || "";
    const awayName = params.get('away') || "";
    const currentGid = params.get('gid');

    document.getElementById('name-home').innerText = homeName;
    document.getElementById('name-away').innerText = awayName;

    // --- 2. NORMALISATION ---
    function normalizeName(name) {
        if (!name) return "";
        let n = name.toLowerCase().trim();
        if (CLUB_ALIASES[n]) n = CLUB_ALIASES[n];
        return n.normalize("NFD").replace(/[\u0300-\u036f]/g, "")
                .replace(/\b(fc|sc|club|as|ol|de)\b/gi, "")
                .replace(/[^a-z0-9]/g, "")
                .trim();
    }

    // --- 3. CHARGEMENT INITIAL (Ce qui manquait) ---
    async function init() {
        const statusEl = document.getElementById('loading-status');
        try {
            const response = await fetch(GLOBAL_DATA_URL);
            const data = await response.text();
            const rows = data.split('\n').map(r => r.split(','));
            
            const normHome = normalizeName(homeName);
            const normAway = normalizeName(awayName);

            // Filtre les matchs correspondant aux deux équipes (peu importe l'ordre)
            const matches = rows.filter(r => {
                const rHome = normalizeName(r[1]);
                const rAway = normalizeName(r[2]);
                return (rHome === normHome && rAway === normAway) || 
                       (rHome === normAway && rAway === normHome);
            });

            if (matches.length > 0) {
                statusEl.innerHTML = `<i class="fas fa-check"></i> ${matches.length} match(s) trouvé(s)`;
                displayMatchSelector(matches);
            } else {
                statusEl.innerHTML = '<i class="fas fa-exclamation-circle"></i> Aucun match trouvé dans la base.';
            }
        } catch (err) {
            statusEl.innerHTML = "Erreur de chargement des données.";
            console.error(err);
        }
    }

    // --- 4. AFFICHAGE ET REMPLISSAGE ---
    function displayMatchSelector(matches) {
    const container = document.getElementById('match-selector-container');
    window.tempMatchesData = matches; // Stockage temporaire des résultats de recherche
    let html = '<div style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px;">';
    
    matches.forEach((m, i) => {
        html += `
            <label style="display: flex; align-items: center; background: #252525; border: 1px solid #444; padding: 12px; cursor: pointer; border-radius: 6px; color: #fff;">
                <input type="checkbox" class="match-checkbox" value="${i}" style="width: 20px; height: 20px; margin-right: 15px;">
                <span><i class="far fa-calendar-alt"></i> ${m[0]} | <strong>${m[1]}</strong> ${m[4]}-${m[5]} <strong>${m[2]}</strong></span>
            </label>`;
    });

    html += `
        <button type="button" onclick="processSelectedMatches()" 
                style="background: #d4af37; color: #000; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: 800; text-transform: uppercase;">
            Fusionner les 2 mi-temps sélectionnées
        </button>
    </div>`;
    container.innerHTML = html;
}

    window.fillFormFromIndex = async function(index) {
        const m = window.tempMatchesData[index];
        const matchID = m[3].trim(); 
        const isReverse = (normalizeName(m[1]) === normalizeName(awayName));

        // Mapping des colonnes du CSV MATCHES vers les IDs du formulaire
        const map = {
            'in-sh': isReverse ? 5 : 4, 'in-sa': isReverse ? 4 : 5,
            'in-stH': isReverse ? 7 : 6, 'in-stA': isReverse ? 6 : 7,
            'in-posH': isReverse ? 9 : 8, 'in-posA': isReverse ? 8 : 9,
            'in-shoH': isReverse ? 11 : 10, 'in-shoA': isReverse ? 10 : 11,
            'in-pasAttH': isReverse ? 13 : 12, 'in-pasAttA': isReverse ? 12 : 13,
            'in-accH': isReverse ? 15 : 14, 'in-accA': isReverse ? 14 : 15,
            'in-tacAttH': isReverse ? 17 : 16, 'in-tacAttA': isReverse ? 16 : 17,
            'in-tacMadH': isReverse ? 19 : 18, 'in-tacMadA': isReverse ? 18 : 19,
            'in-redH': isReverse ? 21 : 20, 'in-redA': isReverse ? 20 : 21
        };

        for (let [id, colIndex] of Object.entries(map)) {
            let el = document.getElementById(id);
            if(el) el.value = m[colIndex] || (id.includes('red') ? 0 : "");
        }
        document.getElementById('in-motm').value = m[22] || "";

        // RÉCUPÉRATION DES STATS JOUEURS (Second Fichier)
        try {
            const response = await fetch(PLAYERS_DATA_URL);
            const csvText = await response.text();
            const rows = csvText.split('\n').map(row => row.split(','));
            const matchPlayers = rows.filter(r => r[0].trim() === matchID);
            displayPlayers(matchPlayers, m[1], m[2]); 
        } catch (err) {
            console.error("Erreur joueurs:", err);
        }
        alert("Données du match et des joueurs importées !");
    };

    function displayPlayers(players) {
    const homeList = document.getElementById('home-players-list');
    const awayList = document.getElementById('away-players-list');
    homeList.innerHTML = ""; awayList.innerHTML = "";

    players.forEach(p => {
        // p[1]: Nom, p[5]: Note, p[6]: Buts, p[7]: Assists, p[8]: Tirs, 
        // p[9]: Passes, p[10]: P. Réussies, p[11]: % P., p[12]: Tacles, 
        // p[13]: T. Réussis, p[14]: % T., p[15]: Rouge, p[16]: MotM
        
        const playerHtml = `
            <div class="player-stat-row">
                <span class="player-name-header">${p[1]} ${p[16] == 1 ? '⭐' : ''}</span>
                <div class="stats-grid">
                    <div class="stat-item">Note: <strong>${p[5]}</strong></div>
                    <div class="stat-item">Buts: ${p[6]}</div>
                    <div class="stat-item">Assists: ${p[7]}</div>
                    <div class="stat-item">Tirs: ${p[8]}</div>
                    <div class="stat-item">Passes: ${p[10]}/${p[9]} (${p[11]}%)</div>
                    <div class="stat-item">Tacles: ${p[13]}/${p[12]} (${p[14]}%)</div>
                    <div class="stat-item">Rouge: ${p[15]}</div>
                </div>
            </div>`;

        // Identification de l'équipe (Index 2 dans le CSV)
        if (p[2] === homeName) {
            homeList.innerHTML += playerHtml;
        } else {
            awayList.innerHTML += playerHtml;
        }
    });
}
    // --- 5. ENVOI ---
    document.getElementById('match-report-form').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn-submit');
        btn.innerText = "ENREGISTREMENT...";
        btn.disabled = true;

        const data = Object.fromEntries(new FormData(e.target).entries());
        data.home = homeName; data.away = awayName; data.gid = currentGid;

        try {
            await fetch(APPS_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            alert("Rapport enregistré avec succès !");
            window.location.href = `info-match.html?home=${encodeURIComponent(homeName)}&away=${encodeURIComponent(awayName)}&gid=${currentGid}`;
        } catch (e) {
            alert("Erreur lors de l'envoi");
            btn.disabled = false;
            btn.innerText = "Valider et enregistrer le match";
        }
    };

window.combineSelectedMatches = async function() {
    const checked = document.querySelectorAll('.match-checkbox:checked');
    if (checked.length !== 2) {
        alert("Veuillez sélectionner exactement 2 matchs pour les fusionner.");
        return;
    }

    const idx1 = checked[0].value;
    const idx2 = checked[1].value;
    const m1 = window.tempMatchesData[idx1];
    const m2 = window.tempMatchesData[idx2];

    // On détermine si les équipes sont inversées par rapport aux paramètres de l'URL
    const isReverse1 = (normalizeName(m1[1]) === normalizeName(awayName));
    const isReverse2 = (normalizeName(m2[1]) === normalizeName(awayName));

    // Fonction utilitaire pour extraire la valeur selon le sens du match
    const getVal = (m, rev, homeCol, awayCol) => parseInt(m[rev ? awayCol : homeCol]) || 0;
    const getTxt = (m, rev, homeCol, awayCol) => m[rev ? awayCol : homeCol] || "";

    // CALCUL DE FUSION (Addition ou Moyenne selon la stat)
    const combinedData = {
        'in-sh': getVal(m1, isReverse1, 4, 5) + getVal(m2, isReverse2, 4, 5),
        'in-sa': getVal(m1, isReverse1, 5, 4) + getVal(m2, isReverse2, 5, 4),
        'in-stH': getTxt(m1, isReverse1, 6, 7) + " / " + getTxt(m2, isReverse2, 6, 7),
        'in-stA': getTxt(m1, isReverse1, 7, 6) + " / " + getTxt(m2, isReverse2, 7, 6),
        'in-posH': Math.round((getVal(m1, isReverse1, 8, 9) + getVal(m2, isReverse2, 8, 9)) / 2),
        'in-posA': Math.round((getVal(m1, isReverse1, 9, 8) + getVal(m2, isReverse2, 9, 8)) / 2),
        'in-shoH': getVal(m1, isReverse1, 10, 11) + getVal(m2, isReverse2, 10, 11),
        'in-shoA': getVal(m1, isReverse1, 11, 10) + getVal(m2, isReverse2, 11, 10),
        'in-pasAttH': getVal(m1, isReverse1, 12, 13) + getVal(m2, isReverse2, 12, 13),
        'in-pasAttA': getVal(m1, isReverse1, 13, 12) + getVal(m2, isReverse2, 13, 12),
        'in-accH': Math.round((getVal(m1, isReverse1, 14, 15) + getVal(m2, isReverse2, 14, 15)) / 2),
        'in-accA': Math.round((getVal(m1, isReverse1, 15, 14) + getVal(m2, isReverse2, 15, 14)) / 2),
        'in-tacAttH': getVal(m1, isReverse1, 16, 17) + getVal(m2, isReverse2, 16, 17),
        'in-tacAttA': getVal(m1, isReverse1, 17, 16) + getVal(m2, isReverse2, 17, 16),
        'in-tacMadH': getVal(m1, isReverse1, 18, 19) + getVal(m2, isReverse2, 18, 19),
        'in-tacMadA': getVal(m1, isReverse1, 19, 18) + getVal(m2, isReverse2, 19, 18),
        'in-redH': getVal(m1, isReverse1, 20, 21) + getVal(m2, isReverse2, 20, 21),
        'in-redA': getVal(m1, isReverse1, 21, 20) + getVal(m2, isReverse2, 21, 20)
    };

    // Remplissage du formulaire
    for (let [id, val] of Object.entries(combinedData)) {
        let el = document.getElementById(id);
        if (el) el.value = val;
    }

    // Gestion des joueurs (Cumul des deux matchs)
    fetchPlayersForTwoMatches(m1[3].trim(), m2[3].trim());
    
    alert("Matchs fusionnés avec succès !");
};

      // --- FONCTION DE FUSION DES MATCHS (MI-TEMPS 1 + 2) ---
window.processSelectedMatches = async function() {
    const selectedCheckboxes = document.querySelectorAll('.match-checkbox:checked');
    
    if (selectedCheckboxes.length !== 2) {
        alert("Veuillez sélectionner exactement 2 matchs (les deux mi-temps).");
        return;
    }

    // Récupération des données brutes des deux matchs sélectionnés
    const m1 = window.tempMatchesData[selectedCheckboxes[0].value];
    const m2 = window.tempMatchesData[selectedCheckboxes[1].value];
    
    // Vérification du sens du match (si l'équipe sélectionnée est Home ou Away dans le CSV)
    const isRev1 = (normalizeName(m1[1]) === normalizeName(awayName));
    const isRev2 = (normalizeName(m2[1]) === normalizeName(awayName));

    // Fonctions utilitaires pour le calcul
    const sum = (colH, colA, isR1, isR2) => {
        return (parseInt(m1[isR1 ? colA : colH]) || 0) + (parseInt(m2[isR2 ? colA : colH]) || 0);
    };
    const avg = (colH, colA, isR1, isR2) => {
        return Math.round(((parseInt(m1[isR1 ? colA : colH]) || 0) + (parseInt(m2[isR2 ? colA : colH]) || 0)) / 2);
    };

    // 1. Remplissage des statistiques d'équipe dans le formulaire
    document.getElementById('in-sh').value = sum(4, 5, isRev1, isRev2); // Score Home
    document.getElementById('in-sa').value = sum(5, 4, isRev1, isRev2); // Score Away
    
    document.getElementById('in-posH').value = avg(8, 9, isRev1, isRev2); // Possession
    document.getElementById('in-posA').value = avg(9, 8, isRev1, isRev2);
    
    document.getElementById('in-shoH').value = sum(10, 11, isRev1, isRev2); // Tirs
    document.getElementById('in-shoA').value = sum(11, 10, isRev1, isRev2);

    document.getElementById('in-pasAttH').value = sum(12, 13, isRev1, isRev2); // Passes
    document.getElementById('in-pasAttA').value = sum(13, 12, isRev1, isRev2);
    
    document.getElementById('in-accH').value = avg(14, 15, isRev1, isRev2); // Précision %
    document.getElementById('in-accA').value = avg(15, 14, isRev1, isRev2);

    document.getElementById('in-redH').value = sum(20, 21, isRev1, isRev2); // Cartons Rouges
    document.getElementById('in-redA').value = sum(21, 20, isRev1, isRev2);

    // Concaténation des buteurs
    const buteursH = (m1[isRev1 ? 7 : 6] + " / " + m2[isRev2 ? 7 : 6]).replace(/undefined|null/g, "").trim();
    const buteursA = (m1[isRev1 ? 6 : 7] + " / " + m2[isRev2 ? 6 : 7]).replace(/undefined|null/g, "").trim();
    document.getElementById('in-stH').value = buteursH === "/" ? "" : buteursH;
    document.getElementById('in-stA').value = buteursA === "/" ? "" : buteursA;

    // 2. Lancement de la fusion des joueurs
    await fetchPlayersForTwoMatches(m1[3].trim(), m2[3].trim());
    
    alert("Les données des deux mi-temps ont été fusionnées avec succès !");
};

// --- FONCTION DE FUSION DES STATISTIQUES JOUEURS ---
async function fetchPlayersForTwoMatches(id1, id2) {
    try {
        const response = await fetch(PLAYERS_DATA_URL);
        const csvText = await response.text();
        const rows = csvText.split('\n').map(row => row.split(','));
        
        const playersMap = {};

        rows.forEach(r => {
            const mId = r[0].trim();
            if (mId === id1 || mId === id2) {
                const pName = r[1];
                if (!playersMap[pName]) {
                    playersMap[pName] = [...r]; 
                    // Conversion initiale en nombres pour les colonnes de stats
                    [5,6,7,8,9,10,12,13,15,16].forEach(idx => playersMap[pName][idx] = parseFloat(r[idx]) || 0);
                } else {
                    // Addition des stats cumulatives (Buts, Assists, Tirs, Passes, Tacles, Rouges)
                    [6,7,8,9,10,12,13,15,16].forEach(idx => {
                        playersMap[pName][idx] += (parseFloat(r[idx]) || 0);
                    });
                    // Moyenne pour la note du match
                    playersMap[pName][5] = ((parseFloat(playersMap[pName][5]) + (parseFloat(r[5]) || 0)) / 2).toFixed(1);
                }
            }
        });

        // Recalcul des pourcentages de réussite globaux sur les deux matchs
        Object.values(playersMap).forEach(p => {
            p[11] = p[9] > 0 ? Math.round((p[10] / p[9]) * 100) : 0; // % Passes
            p[14] = p[12] > 0 ? Math.round((p[13] / p[12]) * 100) : 0; // % Tacles
        });

        // Envoi vers la fonction d'affichage HTML
        displayPlayers(Object.values(playersMap));
        
    } catch (err) {
        console.error("Erreur lors de la fusion des joueurs:", err);
    }
}

      
    // Lancement de la recherche
    init();
</script>
