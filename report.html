<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>FUMA - Report Data</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .report-form-container { max-width: 800px; margin: 20px auto; padding: 20px; }
        .grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .team-sec { background: #1a1a1a; padding: 20px; border-radius: 10px; border: 1px solid #333; }
        label { display: block; margin-top: 15px; font-size: 0.8rem; color: #d4af37; font-weight: 600; }
        input { width: 100%; padding: 10px; background: #000; border: 1px solid #444; color: #fff; border-radius: 5px; box-sizing: border-box; }
        .submit-btn { width: 100%; padding: 20px; background: #d4af37; color: #000; border: none; font-weight: 800; margin-top: 30px; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="fuma-container">
    <header style="text-align: center; padding: 30px 0;">
        <h1 style="color: var(--fuma-primary); font-weight: 800; letter-spacing: 2px; margin: 0;">DATA REPORT SYSTEM</h1>
        <p style="color: var(--fuma-text-dim); font-size: 0.9rem;">Enregistrement des statistiques officielles FUMA</p>
    </header>

    <div id="import-section" style="max-width: 800px; margin: 0 auto 30px auto; padding: 0 20px;">
        <div id="loading-status" style="text-align: center; margin-bottom: 10px; font-weight: 600;">
            <i class="fas fa-spinner fa-spin"></i> Recherche de matchs existants...
        </div>
        <div id="match-selector-container"></div>
    </div>

    <form id="match-report-form" style="max-width: 900px; margin: 0 auto; padding-bottom: 100px;">
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 0 20px;">
            <div class="report-card">
                <h2 id="name-home" class="team-title">HOME</h2>
                <label>Score Final</label>
                <input type="number" name="sh" id="in-sh" required>
                <label>Buteurs (Noms / Minutes)</label>
                <input type="text" name="stH" id="in-stH">
                <label>Possession %</label>
                <input type="number" name="posH" id="in-posH">
                <label>Tirs Totaux</label>
                <input type="number" name="shoH" id="in-shoH">
                <label>Passes Tentées</label>
                <input type="number" name="pasAttH" id="in-pasAttH">
                <label>Précision des Passes %</label>
                <input type="number" name="accH" id="in-accH">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div><label>Tacles réussis</label><input type="number" name="tacMadH" id="in-tacMadH"></div>
                    <div><label>Tacles tentés</label><input type="number" name="tacAttH" id="in-tacAttH"></div>
                </div>
                <label>Cartons Rouges</label>
                <input type="number" name="redH" id="in-redH" value="0">
            </div>

            <div class="report-card">
                <h2 id="name-away" class="team-title">AWAY</h2>
                <label>Score Final</label>
                <input type="number" name="sa" id="in-sa" required>
                <label>Buteurs (Noms / Minutes)</label>
                <input type="text" name="stA" id="in-stA">
                <label>Possession %</label>
                <input type="number" name="posA" id="in-posA">
                <label>Tirs Totaux</label>
                <input type="number" name="shoA" id="in-shoA">
                <label>Passes Tentées</label>
                <input type="number" name="pasAttA" id="in-pasAttA">
                <label>Précision des Passes %</label>
                <input type="number" name="accA" id="in-accA">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div><label>Tacles réussis</label><input type="number" name="tacMadA" id="in-tacMadA"></div>
                    <div><label>Tacles tentés</label><input type="number" name="tacAttA" id="in-tacAttA"></div>
                </div>
                <label>Cartons Rouges</label>
                <input type="number" name="redA" id="in-redA" value="0">
            </div>
        </div>

        <div style="padding: 20px;">
            <div class="motm-section">
                <label style="margin-top: 0;">MAN OF THE MATCH (NOM COMPLET)</label>
                <input type="text" name="motm" id="in-motm" placeholder="Nom du joueur">
            </div>
        </div>

        <div id="players-stats-container">
            <div id="home-players-list">
                <h3 class="list-title">Stats Joueurs (Domicile)</h3>
                <div class="list"></div>
            </div>
            <div id="away-players-list">
                <h3 class="list-title">Stats Joueurs (Extérieur)</h3>
                <div class="list"></div>
            </div>
        </div>

        <div style="padding: 40px 20px;">
            <button type="submit" id="btn-submit" class="submit-button">
                <i class="fas fa-cloud-upload-alt"></i> Valider et enregistrer le match
            </button>
        </div>
    </form>
</div>

    <style>
     :root {
    --fuma-primary: #d4af37;
    --fuma-bg: #000;
    --fuma-card: #151515;
    --fuma-border: #333;
    --fuma-text-dim: #aaa;
}

/* Structure Formulaire */
.report-card {
    background: var(--fuma-card);
    border: 1px solid var(--fuma-border);
    border-radius: 15px;
    padding: 20px;
}
.team-title {
    color: var(--fuma-primary);
    text-align: center;
    border-bottom: 1px solid var(--fuma-border);
    padding-bottom: 10px;
}
.motm-section {
    background: #1a1a1a;
    padding: 20px;
    border-radius: 15px;
    border: 1px solid var(--fuma-primary);
}

/* Stats Individuelles */
#players-stats-container {
    margin-top: 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    padding: 0 20px;
}
.list-title {
    color: var(--fuma-text-dim);
    font-size: 0.9rem;
    text-transform: uppercase;
    margin-bottom: 15px;
}
.player-card {
    background: #222;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 10px;
}
.player-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #444;
    padding-bottom: 5px;
    margin-bottom: 8px;
}
.player-name { font-weight: 800; color: #fff; text-transform: uppercase; }
.player-rating { font-weight: 900; color: var(--fuma-primary); font-size: 1.1rem; }
.stats-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
}
.stat-item { font-size: 0.75rem; color: #ccc; }
.stat-label { color: var(--fuma-text-dim); display: block; font-size: 0.6rem; text-transform: uppercase; }
.stat-val { font-weight: 600; color: #fff; }

/* Badges */
.badge-motm { background: var(--fuma-primary); color: #000; padding: 2px 5px; border-radius: 3px; font-size: 0.6rem; font-weight: 800; }
.badge-red { background: #ff4444; color: #fff; padding: 2px 5px; border-radius: 3px; font-size: 0.6rem; font-weight: 800; }

/* Boutons */
.submit-button {
    width: 100%;
    padding: 20px;
    background: var(--fuma-primary);
    color: #000;
    border: none;
    border-radius: 10px;
    font-weight: 800;
    font-size: 1.1rem;
    cursor: pointer;
    text-transform: uppercase;
}
    </style>
  <script>
  // --- CONFIGURATION ---
const GLOBAL_DATA_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQmb8QyRSXiEG9O7vApX3Xy1elzQ5NpB5DYLMmwdJcyhhB4uMmrRlPWmrZVR4W8AlzKxqpavcLYGEK8/pub?gid=1610453677&single=true&output=csv";
const PLAYERS_DATA_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQmb8QyRSXiEG9O7vApX3Xy1elzQ5NpB5DYLMmwdJcyhhB4uMmrRlPWmrZVR4W8AlzKxqpavcLYGEK8/pub?gid=420142588&single=true&output=csv";
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyI-SMPkKDGoGg48Bke8ELycDUbgLXGgwmn83Ydz8ipfd7NO0gWYhwAR4t-kuF2wfUB/exec";

const params = new URLSearchParams(window.location.search);
const homeName = params.get('home') || "";
const awayName = params.get('away') || "";
const currentGid = params.get('gid');

document.getElementById('name-home').innerText = homeName;
document.getElementById('name-away').innerText = awayName;

// --- FONCTIONS DE CHARGEMENT ---
async function init() {
    const statusEl = document.getElementById('loading-status');
    try {
        const response = await fetch(GLOBAL_DATA_URL);
        const data = await response.text();
        const rows = data.split('\n').map(r => r.split(','));
        const normHome = normalize(homeName);
        const normAway = normalize(awayName);

        const matches = rows.filter(r => {
            const h = normalize(r[1]); const a = normalize(r[2]);
            return (h === normHome && a === normAway) || (h === normAway && a === normHome);
        });

        if (matches.length > 0) {
            displayMatchSelector(matches);
            statusEl.innerHTML = "Matchs trouvés.";
        } else {
            statusEl.innerHTML = "Aucun match trouvé.";
        }
    } catch (err) { statusEl.innerHTML = "Erreur."; }
}

function normalize(s) { return s.toLowerCase().trim().normalize("NFD").replace(/[^a-z0-9]/g, ""); }

window.fillFormFromIndex = async function(index) {
    const m = window.tempMatchesData[index];
    const matchID = m[3].trim();
    const isReverse = (normalize(m[1]) === normalize(awayName));

    // Mapping Auto des stats collectives (index selon votre CSV global)
    const map = {
        'in-sh': isReverse ? 5 : 4, 'in-sa': isReverse ? 4 : 5,
        'in-stH': isReverse ? 7 : 6, 'in-stA': isReverse ? 6 : 7,
        'in-posH': isReverse ? 9 : 8, 'in-posA': isReverse ? 8 : 9,
        'in-shoH': isReverse ? 11 : 10, 'in-shoA': isReverse ? 10 : 11,
        'in-pasAttH': isReverse ? 13 : 12, 'in-pasAttA': isReverse ? 12 : 13,
        'in-accH': isReverse ? 15 : 14, 'in-accA': isReverse ? 14 : 15,
        'in-tacMadH': isReverse ? 19 : 18, 'in-tacMadA': isReverse ? 18 : 19,
        'in-redH': isReverse ? 21 : 20, 'in-redA': isReverse ? 20 : 21
    };

    for (let [id, col] of Object.entries(map)) {
        if(document.getElementById(id)) document.getElementById(id).value = m[col] || 0;
    }
    document.getElementById('in-motm').value = m[22] || "";

    // Chargement des Stats Joueurs détaillées
    const resp = await fetch(PLAYERS_DATA_URL);
    const csv = await resp.text();
    const players = csv.split('\n').map(r => r.split(',')).filter(r => r[0].trim() === matchID);
    displayPlayers(players, m[1], m[2]);
};

function displayPlayers(players, hName, aName) {
    const hList = document.querySelector('#home-players-list .list');
    const aList = document.querySelector('#away-players-list .list');
    hList.innerHTML = ""; aList.innerHTML = "";

    players.forEach(p => {
        const html = `
            <div class="player-card">
                <div class="player-header">
                    <span class="player-name">${p[1]} ${parseInt(p[16])? '<span class="badge-motm">MOTM</span>':''}</span>
                    <span class="player-rating">${p[5]}</span>
                </div>
                <div class="stats-grid">
                    <div class="stat-item"><span class="stat-label">G / A</span><span class="stat-val">${p[6]}/${p[7]}</span></div>
                    <div class="stat-item"><span class="stat-label">Tirs</span><span class="stat-val">${p[8]}</span></div>
                    <div class="stat-item"><span class="stat-label">Passes %</span><span class="stat-val">${p[10]}/${p[9]} (${p[11]}%)</span></div>
                    <div class="stat-item"><span class="stat-label">Tacles %</span><span class="stat-val">${p[13]}/${p[12]} (${p[14]}%)</span></div>
                </div>
            </div>`;
        if (p[2] === hName) hList.innerHTML += html; else aList.innerHTML += html;
    });
}

init();
</script>
</body>
</html>
