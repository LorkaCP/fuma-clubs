<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>FUMA - Report Data</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .report-form-container { max-width: 800px; margin: 20px auto; padding: 20px; }
        .grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .team-sec { background: #1a1a1a; padding: 20px; border-radius: 10px; border: 1px solid #333; }
        label { display: block; margin-top: 15px; font-size: 0.8rem; color: #d4af37; font-weight: 600; }
        input { width: 100%; padding: 10px; background: #000; border: 1px solid #444; color: #fff; border-radius: 5px; box-sizing: border-box; }
        .submit-btn { width: 100%; padding: 20px; background: #d4af37; color: #000; border: none; font-weight: 800; margin-top: 30px; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="fuma-container">
        <header style="text-align: center; padding: 30px 0;">
            <h1 style="color: var(--fuma-primary); font-weight: 800; letter-spacing: 2px; margin: 0;">DATA REPORT SYSTEM</h1>
            <p style="color: var(--fuma-text-dim); font-size: 0.9rem;">Enregistrement des statistiques officielles FUMA</p>
        </header>

        <div id="import-section" style="max-width: 800px; margin: 0 auto 30px auto; padding: 0 20px;">
            <div id="loading-status" style="text-align: center; margin-bottom: 10px; font-weight: 600;">
                <i class="fas fa-spinner fa-spin"></i> Recherche de matchs existants...
            </div>
            <div id="match-selector-container">
                </div>
        </div>

        <form id="match-report-form" style="max-width: 900px; margin: 0 auto; padding-bottom: 100px;">
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 0 20px;">
                
                <div class="report-card" style="background: #151515; border: 1px solid #333; border-radius: 15px; padding: 20px;">
                    <h2 id="name-home" style="color: var(--fuma-primary); text-align: center; border-bottom: 1px solid #333; padding-bottom: 10px;">HOME</h2>
                    
                    <label>Score Final</label>
                    <input type="number" name="sh" id="in-sh" placeholder="0" required>

                    <label>Buteurs (Noms / Minutes)</label>
                    <input type="text" name="stH" id="in-stH" placeholder="ex: Messi 12', 45'">

                    <label>Possession %</label>
                    <input type="number" name="posH" id="in-posH" placeholder="50">

                    <label>Tirs Totaux</label>
                    <input type="number" name="shoH" id="in-shoH" placeholder="0">

                    <label>Passes Tentées</label>
                    <input type="number" name="pasAttH" id="in-pasAttH" placeholder="0">

                    <label>Précision des Passes %</label>
                    <input type="number" name="accH" id="in-accH" placeholder="0">

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <div>
                            <label>Tacles réussis</label>
                            <input type="number" name="tacMadH" id="in-tacMadH" placeholder="0">
                        </div>
                        <div>
                            <label>Tacles tentés</label>
                            <input type="number" name="tacAttH" id="in-tacAttH" placeholder="0">
                        </div>
                    </div>

                    <label>Cartons Rouges</label>
                    <input type="number" name="redH" id="in-redH" value="0">
                </div>

                <div class="report-card" style="background: #151515; border: 1px solid #333; border-radius: 15px; padding: 20px;">
                    <h2 id="name-away" style="color: var(--fuma-primary); text-align: center; border-bottom: 1px solid #333; padding-bottom: 10px;">AWAY</h2>
                    
                    <label>Score Final</label>
                    <input type="number" name="sa" id="in-sa" placeholder="0" required>

                    <label>Buteurs (Noms / Minutes)</label>
                    <input type="text" name="stA" id="in-stA" placeholder="ex: Haaland 88'">

                    <label>Possession %</label>
                    <input type="number" name="posA" id="in-posA" placeholder="50">

                    <label>Tirs Totaux</label>
                    <input type="number" name="shoA" id="in-shoA" placeholder="0">

                    <label>Passes Tentées</label>
                    <input type="number" name="pasAttA" id="in-pasAttA" placeholder="0">

                    <label>Précision des Passes %</label>
                    <input type="number" name="accA" id="in-accA" placeholder="0">

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <div>
                            <label>Tacles réussis</label>
                            <input type="number" name="tacMadA" id="in-tacMadA" placeholder="0">
                        </div>
                        <div>
                            <label>Tacles tentés</label>
                            <input type="number" name="tacAttA" id="in-tacAttA" placeholder="0">
                        </div>
                    </div>

                    <label>Cartons Rouges</label>
                    <input type="number" name="redA" id="in-redA" value="0">
                </div>
            </div>

            <div style="padding: 20px;">
                <div style="background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid var(--fuma-primary);">
                    <label style="margin-top: 0;">MAN OF THE MATCH (NOM COMPLET)</label>
                    <input type="text" name="motm" id="in-motm" placeholder="Nom du joueur">
                </div>
            </div>

            <div style="padding: 0 20px;">
                <button type="submit" id="btn-submit" class="submit-button" 
                        style="width: 100%; padding: 20px; background: var(--fuma-primary); color: #000; border: none; border-radius: 10px; font-weight: 800; font-size: 1.1rem; cursor: pointer; text-transform: uppercase; transition: 0.3s;">
                    <i class="fas fa-cloud-upload-alt"></i> Valider et enregistrer le match
                </button>
            </div>

        </form>
    </div>

    <style>
        label {
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            font-size: 0.75rem;
            color: var(--fuma-text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        input {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: var(--fuma-primary);
        }
        .submit-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
        }
        .select-match-btn:hover {
            border-color: var(--fuma-primary) !important;
            background: #303030 !important;
        }
    </style>
   <script>
    // 1. CONFIGURATION DES URLS
    // URL de la feuille "Matches" du premier Google Sheet (Publié en CSV)
    const GLOBAL_DATA_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vREfI8S8fkz3U_S37N7U2hVf0p6S_m_A1I8Vf-v-v-v-v-v-v/pub?gid=1610453677&single=true&output=csv";
    
    // URL de votre déploiement Google Apps Script (doPost)
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyI-SMPkKDGoGg48Bke8ELycDUbgLXGgwmn83Ydz8ipfd7NO0gWYhwAR4t-kuF2wfUB/exec";

    // 2. RECUPERATION DES PARAMETRES URL
    const params = new URLSearchParams(window.location.search);
    const homeName = params.get('home');
    const awayName = params.get('away');
    const currentGid = params.get('gid');

    document.getElementById('name-home').innerText = homeName;
    document.getElementById('name-away').innerText = awayName;

    // 3. CHARGEMENT DES MATCHS EXISTANTS POUR PRE-REMPLISSAGE
    window.addEventListener('DOMContentLoaded', async () => {
        const statusEl = document.getElementById('loading-status');
        try {
            const response = await fetch(GLOBAL_DATA_URL);
            const csvText = await response.text();
            
            // Parsing simple du CSV
            const rows = csvText.split('\n').map(row => {
                // Gestion des guillemets dans le CSV
                return row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(cell => cell.replace(/^"|"$/g, '').trim());
            });

            // On cherche les matchs entre ces deux équipes (Home vs Away OU Away vs Home)
            // Selon votre structure : Col 1 = TeamHome, Col 2 = TeamAway
            const foundMatches = rows.filter(r => 
                (r[1] === homeName && r[2] === awayName) || (r[1] === awayName && r[2] === homeName)
            );

            if (foundMatches.length > 0) {
                statusEl.innerHTML = `<span style="color: #d4af37;"><i class="fas fa-info-circle"></i> ${foundMatches.length} match(s) trouvé(s) dans la base. Choisissez celui à importer :</span>`;
                displayMatchSelector(foundMatches);
            } else {
                statusEl.innerText = "Aucun match existant trouvé. Saisie manuelle requise.";
            }
        } catch (err) {
            console.error("Erreur de chargement base centrale:", err);
            statusEl.innerText = "Erreur de connexion à la base de données.";
        }
    });

    // 4. AFFICHAGE DU SELECTEUR DE MATCHS
    function displayMatchSelector(matches) {
        const selectorContainer = document.getElementById('match-selector-container');
        if (!selectorContainer) return;

        let html = '<div style="display: flex; flex-direction: column; gap: 8px; margin-top:10px;">';
        matches.forEach((m, index) => {
            // Affichage : Date - Home Score - Away Team
            html += `
                <button type="button" onclick="fillFormFromIndex(${index})" class="select-match-btn" 
                        style="text-align: left; background: #252525; color: #fff; border: 1px solid #444; padding: 12px; cursor: pointer; border-radius: 6px; font-size: 0.85rem;">
                    <i class="far fa-calendar-alt"></i> ${m[0]} | <strong>${m[1]}</strong> ${m[4]}-${m[5]} <strong>${m[2]}</strong> (ID: ${m[3]})
                </button>`;
        });
        html += '</div>';
        selectorContainer.innerHTML = html;
        window.tempMatchesData = matches; // Stockage temporaire
    }

    // 5. REMPLISSAGE AUTOMATIQUE DU FORMULAIRE
    window.fillFormFromIndex = function(index) {
    const m = window.tempMatchesData[index];
    
    // On vérifie si les équipes sont dans le même sens que la page actuelle
    // homeName et awayName sont récupérés des paramètres de l'URL
    const isReverse = (m[1].trim() === awayName.trim()); 

    // Mappage précis selon votre CSV
    // Si isReverse est vrai, on prend la colonne de l'autre équipe
    
    // Scores
    document.getElementById('in-sh').value = isReverse ? m[5] : m[4];
    document.getElementById('in-sa').value = isReverse ? m[4] : m[5];
    
    // Buteurs
    document.getElementById('in-stH').value = isReverse ? m[7] : m[6];
    document.getElementById('in-stA').value = isReverse ? m[6] : m[7];
    
    // Possession (Index 8 et 9)
    document.getElementById('in-posH').value = isReverse ? m[9] : m[8];
    document.getElementById('in-posA').value = isReverse ? m[8] : m[9];
    
    // Tirs (Index 10 et 11)
    document.getElementById('in-shoH').value = isReverse ? m[11] : m[10];
    document.getElementById('in-shoA').value = isReverse ? m[10] : m[11];
    
    // Passes Tentées (Index 12 et 13)
    document.getElementById('in-pasAttH').value = isReverse ? m[13] : m[12];
    document.getElementById('in-pasAttA').value = isReverse ? m[12] : m[13];
    
    // Précision % (Index 14 et 15)
    document.getElementById('in-accH').value = isReverse ? m[15] : m[14];
    document.getElementById('in-accA').value = isReverse ? m[14] : m[15];
    
    // Tacles Tentés (Index 16 et 17)
    document.getElementById('in-tacAttH').value = isReverse ? m[17] : m[16];
    document.getElementById('in-tacAttA').value = isReverse ? m[16] : m[17];
    
    // Tacles Réussis (Index 18 et 19)
    document.getElementById('in-tacMadH').value = isReverse ? m[19] : m[18];
    document.getElementById('in-tacMadA').value = isReverse ? m[18] : m[19];
    
    // Cartons Rouges (Index 20 et 21)
    document.getElementById('in-redH').value = isReverse ? m[21] : m[20];
    document.getElementById('in-redA').value = isReverse ? m[20] : m[21];
    
    // Homme du Match (Index 22)
    document.getElementById('in-motm').value = m[22];

    alert(isReverse ? "Match importé (Données inversées pour correspondre au sens Home/Away)" : "Match importé avec succès !");
};
    // 6. ENVOI DU FORMULAIRE VIA POST (Apps Script)
    document.getElementById('match-report-form').onsubmit = async (e) => {
        e.preventDefault();
        
        const btn = document.getElementById('btn-submit');
        btn.innerText = "ENVOI EN COURS...";
        btn.disabled = true;

        // Collecte des données
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());
        
        // Ajout des infos de contexte
        data.home = homeName;
        data.away = awayName;
        data.matchId = "M-" + Date.now(); // Génération d'un ID unique si absent

        try {
            // Note: mode 'no-cors' car Google Apps Script ne renvoie pas de headers CORS standard
            await fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                cache: 'no-cache',
                body: JSON.stringify(data)
            });

            alert("Le score a été enregistré avec succès dans le Google Sheet !");
            // Retour à la page du match
            window.location.href = `info-match.html?home=${encodeURIComponent(homeName)}&away=${encodeURIComponent(awayName)}&gid=${currentGid}`;
            
        } catch (error) {
            console.error("Erreur lors de l'envoi:", error);
            alert("Erreur lors de l'enregistrement. Vérifiez votre connexion.");
            btn.disabled = false;
            btn.innerText = "RÉESSAYER L'ENREGISTREMENT";
        }
    };
</script>
</body>
</html>
