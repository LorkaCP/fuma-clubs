<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>FUMA - Report Data</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .report-form-container { max-width: 800px; margin: 20px auto; padding: 20px; }
        .grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .team-sec { background: #1a1a1a; padding: 20px; border-radius: 10px; border: 1px solid #333; }
        label { display: block; margin-top: 15px; font-size: 0.8rem; color: #d4af37; font-weight: 600; }
        input { width: 100%; padding: 10px; background: #000; border: 1px solid #444; color: #fff; border-radius: 5px; box-sizing: border-box; }
        .submit-btn { width: 100%; padding: 20px; background: #d4af37; color: #000; border: none; font-weight: 800; margin-top: 30px; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="fuma-container">
        <header style="text-align: center; padding: 30px 0;">
            <h1 style="color: var(--fuma-primary); font-weight: 800; letter-spacing: 2px; margin: 0;">DATA REPORT SYSTEM</h1>
            <p style="color: var(--fuma-text-dim); font-size: 0.9rem;">Enregistrement des statistiques officielles FUMA</p>
        </header>

<div id="auth-section" style="text-align: center; margin-bottom: 20px; padding: 0 20px;">
    <a id="discord-login-btn" href="#" 
       onclick="redirectToDiscord(event)"
       style="display: inline-block; background: #5865F2; color: white; padding: 12px 25px; text-decoration: none; border-radius: 8px; font-weight: bold; transition: 0.3s; border: 1px solid rgba(255,255,255,0.1);">
        <i class="fab fa-discord"></i> Se connecter avec Discord pour valider
    </a>
</div>
        
        <div id="import-section" style="max-width: 800px; margin: 0 auto 30px auto; padding: 0 20px;">
            <div id="loading-status" style="text-align: center; margin-bottom: 10px; font-weight: 600;">
                <i class="fas fa-spinner fa-spin"></i> Recherche de matchs existants...
            </div>
            <div id="match-selector-container">
                </div>
        </div>

        <form id="match-report-form" style="max-width: 900px; margin: 0 auto; padding-bottom: 100px;">
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 0 20px;">
                
                <div class="report-card" style="background: #151515; border: 1px solid #333; border-radius: 15px; padding: 20px;">
                    <h2 id="name-home" style="color: var(--fuma-primary); text-align: center; border-bottom: 1px solid #333; padding-bottom: 10px;">HOME</h2>
                    
                    <label>Score Final</label>
                    <input type="number" name="sh" id="in-sh" placeholder="0" required>

                    <label>Buteurs (Noms / Minutes)</label>
                    <input type="text" name="stH" id="in-stH" placeholder="ex: Messi 12', 45'">

                    <label>Possession %</label>
                    <input type="number" name="posH" id="in-posH" placeholder="50">

                    <label>Tirs Totaux</label>
                    <input type="number" name="shoH" id="in-shoH" placeholder="0">

                    <label>Passes Tentées</label>
                    <input type="number" name="pasAttH" id="in-pasAttH" placeholder="0">

                    <label>Précision des Passes %</label>
                    <input type="number" name="accH" id="in-accH" placeholder="0">

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <div>
                            <label>Tacles réussis</label>
                            <input type="number" name="tacMadH" id="in-tacMadH" placeholder="0">
                        </div>
                        <div>
                            <label>Tacles tentés</label>
                            <input type="number" name="tacAttH" id="in-tacAttH" placeholder="0">
                        </div>
                    </div>

                    <label>Cartons Rouges</label>
                    <input type="number" name="redH" id="in-redH" value="0">
                </div>

                <div class="report-card" style="background: #151515; border: 1px solid #333; border-radius: 15px; padding: 20px;">
                    <h2 id="name-away" style="color: var(--fuma-primary); text-align: center; border-bottom: 1px solid #333; padding-bottom: 10px;">AWAY</h2>
                    
                    <label>Score Final</label>
                    <input type="number" name="sa" id="in-sa" placeholder="0" required>

                    <label>Buteurs (Noms / Minutes)</label>
                    <input type="text" name="stA" id="in-stA" placeholder="ex: Haaland 88'">

                    <label>Possession %</label>
                    <input type="number" name="posA" id="in-posA" placeholder="50">

                    <label>Tirs Totaux</label>
                    <input type="number" name="shoA" id="in-shoA" placeholder="0">

                    <label>Passes Tentées</label>
                    <input type="number" name="pasAttA" id="in-pasAttA" placeholder="0">

                    <label>Précision des Passes %</label>
                    <input type="number" name="accA" id="in-accA" placeholder="0">

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <div>
                            <label>Tacles réussis</label>
                            <input type="number" name="tacMadA" id="in-tacMadA" placeholder="0">
                        </div>
                        <div>
                            <label>Tacles tentés</label>
                            <input type="number" name="tacAttA" id="in-tacAttA" placeholder="0">
                        </div>
                    </div>

                    <label>Cartons Rouges</label>
                    <input type="number" name="redA" id="in-redA" value="0">
                </div>
            </div>

            <div style="padding: 20px;">
                <div style="background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid var(--fuma-primary);">
                    <label style="margin-top: 0;">MAN OF THE MATCH (NOM COMPLET)</label>
                    <input type="text" name="motm" id="in-motm" placeholder="Nom du joueur">
                </div>
            </div>

            <div id="players-stats-container" style="margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 0 20px;">
    <div id="home-players-list" class="report-card"><h3>Joueurs (Home)</h3><div class="list"></div></div>
    <div id="away-players-list" class="report-card"><h3>Joueurs (Away)</h3><div class="list"></div></div>
</div>

            <div style="padding: 0 20px;">
                <button type="submit" id="btn-submit" class="submit-button" 
                        style="width: 100%; padding: 20px; background: var(--fuma-primary); color: #000; border: none; border-radius: 10px; font-weight: 800; font-size: 1.1rem; cursor: pointer; text-transform: uppercase; transition: 0.3s;">
                    <i class="fas fa-cloud-upload-alt"></i> Valider et enregistrer le match
                </button>
            </div>

        </form>
    </div>

    <style>
        label {
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            font-size: 0.75rem;
            color: var(--fuma-text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        input {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: var(--fuma-primary);
        }
        .submit-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
        }
        .select-match-btn:hover {
            border-color: var(--fuma-primary) !important;
            background: #303030 !important;
        }

        .player-stat-row {
    font-size: 0.75rem;
    border-bottom: 1px solid #333;
    padding: 8px 0;
    color: #eee;
}
.player-name-header {
    color: #d4af37;
    font-weight: bold;
    display: block;
    margin-bottom: 3px;
}
.stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 5px;
    color: #bbb;
}
.stat-item {
    font-size: 0.7rem;
}
    </style>
 <script>
    // --- 1. CONFIGURATION ---
    const GLOBAL_DATA_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQmb8QyRSXiEG9O7vApX3Xy1elzQ5NpB5DYLMmwdJcyhhB4uMmrRlPWmrZVR4W8AlzKxqpavcLYGEK8/pub?gid=1610453677&single=true&output=csv";
    const PLAYERS_DATA_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQmb8QyRSXiEG9O7vApX3Xy1elzQ5NpB5DYLMmwdJcyhhB4uMmrRlPWmrZVR4W8AlzKxqpavcLYGEK8/pub?gid=420142588&single=true&output=csv";
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbya3FyeM59GPw7Io5yxN9OKHIhOVFfDeYboA7Nt2aUskLZAokzGeN3Utr9sna89RfBoRA/exec?action=match";
    
    let currentPlayersData = []; 
    let discordAuthCode = null;

    const CLUB_ALIASES = {
        "fuma y pasa": "f y pasa",
        "croser fc": "croser fc",
        "fuma clubs a": "fuma clubs a",
    };

    // Initialisation globale
    const urlParams = new URLSearchParams(window.location.search);
    window.homeName = urlParams.get('home') || "";
    window.awayName = urlParams.get('away') || "";
    window.currentGid = urlParams.get('gid');

    // Affichage initial des noms
    document.getElementById('name-home').innerText = window.homeName;
    document.getElementById('name-away').innerText = window.awayName;

    // --- 2. LOGIQUE DISCORD (REDIRECTION) ---
    function redirectToDiscord(event) {
        event.preventDefault();
        const selected = document.querySelectorAll('.match-checkbox:checked');
        
        if (selected.length !== 2) {
            alert("Veuillez d'abord sélectionner les 2 mi-temps à fusionner.");
            return;
        }

        // On sauvegarde tout dans le state avant de partir
        const stateData = {
            home: window.homeName,
            away: window.awayName,
            gid: window.currentGid,
            m1: window.tempMatchesData[selected[0].value][3],
            m2: window.tempMatchesData[selected[1].value][3]
        };

        const state = btoa(JSON.stringify(stateData));
        const clientId = "1473807551329079408";
        const redirectUri = encodeURIComponent("https://fuma-clubs-official.vercel.app/report.html");
        
        window.location.href = `https://discord.com/oauth2/authorize?client_id=${clientId}&response_type=code&redirect_uri=${redirectUri}&scope=identify+guilds.members.read&state=${state}`;
    }

    // --- 3. LOGIQUE RETOUR DISCORD (RESTAURATION) ---
    async function checkDiscordAuth() {
        const params = new URLSearchParams(window.location.search);
        discordAuthCode = params.get('code');
        const stateRaw = params.get('state');

        if (discordAuthCode && stateRaw) {
            try {
                const stateData = JSON.parse(atob(stateRaw));
                
                // On restaure les noms d'équipes pour que la fusion sache qui est qui
                window.homeName = stateData.home;
                window.awayName = stateData.away;
                window.currentGid = stateData.gid;

                document.getElementById('name-home').innerText = window.homeName;
                document.getElementById('name-away').innerText = window.awayName;

                if (document.getElementById('discord-login-btn')) {
                    document.getElementById('discord-login-btn').style.display = 'none';
                }

                // On attend que les données CSV soient chargées par init() avant de restaurer
                let attempts = 0;
                const checkDataReady = setInterval(() => {
                    if (window.tempMatchesData || attempts > 10) {
                        clearInterval(checkDataReady);
                        if (stateData.m1 && stateData.m2) {
                            fetchMatchDataForState(stateData.m1, stateData.m2);
                        }
                    }
                    attempts++;
                }, 500);

            } catch (e) {
                console.error("Erreur State:", e);
            }
        }
    }

    // --- 4. LOGIQUE DE FUSION (EQUIPE + JOUEURS) ---
    async function fetchMatchDataForState(id1, id2) {
        const m1 = window.tempMatchesData.find(m => m[3].trim() === id1);
        const m2 = window.tempMatchesData.find(m => m[3].trim() === id2);

        if (m1 && m2) {
            const isRev1 = (normalizeName(m1[1]) === normalizeName(window.awayName));
            const isRev2 = (normalizeName(m2[1]) === normalizeName(window.awayName));
            
            const sum = (colH, colA, isR1, isR2) => (parseInt(m1[isR1 ? colA : colH]) || 0) + (parseInt(m2[isR2 ? colA : colH]) || 0);
            const avg = (colH, colA, isR1, isR2) => Math.round(((parseInt(m1[isR1 ? colA : colH]) || 0) + (parseInt(m2[isR2 ? colA : colH]) || 0)) / 2);

            // Remplissage automatique du formulaire (Stats Equipe)
            document.getElementById('in-sh').value = sum(4, 5, isRev1, isRev2);
            document.getElementById('in-sa').value = sum(5, 4, isRev1, isRev2);
            document.getElementById('in-posH').value = avg(8, 9, isRev1, isRev2);
            document.getElementById('in-posA').value = avg(9, 8, isRev1, isRev2);
            document.getElementById('in-shoH').value = sum(10, 11, isRev1, isRev2);
            document.getElementById('in-shoA').value = sum(11, 10, isRev1, isRev2);
            document.getElementById('in-pasAttH').value = sum(12, 13, isRev1, isRev2);
            document.getElementById('in-pasAttA').value = sum(13, 12, isRev1, isRev2);
            document.getElementById('in-accH').value = avg(14, 15, isRev1, isRev2);
            document.getElementById('in-accA').value = avg(15, 14, isRev1, isRev2);
            document.getElementById('in-tacAttH').value = sum(16, 17, isRev1, isRev2);
            document.getElementById('in-tacAttA').value = sum(17, 16, isRev1, isRev2);
            document.getElementById('in-tacMadH').value = sum(18, 19, isRev1, isRev2);
            document.getElementById('in-tacMadA').value = sum(19, 18, isRev1, isRev2);
            document.getElementById('in-redH').value = sum(20, 21, isRev1, isRev2);
            document.getElementById('in-redA').value = sum(21, 20, isRev1, isRev2);

            // Buteurs
            const bH = [(m1[isRev1 ? 7 : 6] || ""), (m2[isRev2 ? 7 : 6] || "")].filter(x => x.trim() !== "").join(" | ");
            const bA = [(m1[isRev1 ? 6 : 7] || ""), (m2[isRev2 ? 6 : 7] || "")].filter(x => x.trim() !== "").join(" | ");
            document.getElementById('in-stH').value = bH;
            document.getElementById('in-stA').value = bA;

            // Fusion des joueurs (id1, id2)
            await fetchPlayersForTwoMatches(id1, id2);
        }
    }

    async function fetchPlayersForTwoMatches(id1, id2) {
        const response = await fetch(PLAYERS_DATA_URL);
        const csvText = await response.text();
        const rows = csvText.split('\n').map(row => row.split(','));
        const playersMap = {};

        rows.forEach(r => {
            const mId = r[0] ? r[0].trim() : "";
            if (mId === id1 || mId === id2) {
                const pName = r[1];
                if (!playersMap[pName]) {
                    playersMap[pName] = [...r];
                    [5, 6, 7, 8, 9, 10, 12, 13, 15, 16].forEach(idx => playersMap[pName][idx] = parseFloat(r[idx]) || 0);
                } else {
                    [6, 7, 8, 9, 10, 12, 13, 15, 16].forEach(idx => playersMap[pName][idx] += (parseFloat(r[idx]) || 0));
                    playersMap[pName][5] = parseFloat(((playersMap[pName][5] + (parseFloat(r[5]) || 0)) / 2).toFixed(1));
                }
            }
        });

        currentPlayersData = Object.values(playersMap);
        currentPlayersData.forEach(p => {
            p[11] = p[9] > 0 ? Math.round((p[10] / p[9]) * 100) : 0;
            p[14] = p[12] > 0 ? Math.round((p[13] / p[12]) * 100) : 0;
        });

        displayPlayers(currentPlayersData);
    }

    function displayPlayers(players) {
        const homeList = document.querySelector('#home-players-list .list');
        const awayList = document.querySelector('#away-players-list .list');
        homeList.innerHTML = ""; awayList.innerHTML = "";
        
        const normHome = normalizeName(window.homeName);

        players.forEach(p => {
            const playerHtml = `
                <div class="player-stat-row">
                    <span>${p[1]} [Note: ${p[5]}]</span>
                </div>`;
            if (normalizeName(p[2]) === normHome) homeList.innerHTML += playerHtml;
            else awayList.innerHTML += playerHtml;
        });
    }

    // --- 5. INITIALISATION ET ENVOI ---
    function normalizeName(name) {
        if (!name) return "";
        let n = name.toLowerCase().trim();
        if (CLUB_ALIASES[n]) n = CLUB_ALIASES[n];
        return n.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\b(fc|sc|club|as|ol|de)\b/gi, "").replace(/[^a-z0-9]/g, "").trim();
    }

    async function init() {
        const statusEl = document.getElementById('loading-status');
        try {
            const response = await fetch(GLOBAL_DATA_URL);
            const data = await response.text();
            const rows = data.split('\n').map(r => r.split(','));
            const normHome = normalizeName(window.homeName);
            const normAway = normalizeName(window.awayName);

            const matches = rows.filter(r => {
                const rHome = normalizeName(r[1]);
                const rAway = normalizeName(r[2]);
                return (rHome === normHome && rAway === normAway) || (rHome === normAway && rAway === normHome);
            });

            window.tempMatchesData = matches;
            if (matches.length > 0) {
                statusEl.innerHTML = `<i class="fas fa-check"></i> ${matches.length} mi-temps trouvées`;
                displayMatchSelector(matches);
            } else {
                statusEl.innerHTML = '<i class="fas fa-exclamation-circle"></i> Aucun match trouvé.';
            }
        } catch (err) {
            statusEl.innerHTML = "Erreur de chargement.";
        }
    }

    function displayMatchSelector(matches) {
        const container = document.getElementById('match-selector-container');
        let html = '<div style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px;">';
        matches.forEach((m, i) => {
            html += `<label style="display: flex; align-items: center; background: #252525; border: 1px solid #444; padding: 12px; cursor: pointer; border-radius: 6px; color: #fff;">
                <input type="checkbox" class="match-checkbox" value="${i}" style="width: 20px; height: 20px; margin-right: 15px;">
                <span>${m[0]} | <strong>${m[1]}</strong> ${m[4]}-${m[5]} <strong>${m[2]}</strong></span>
            </label>`;
        });
        html += `<button type="button" onclick="processSelectedMatches()" style="background: #d4af37; color: #000; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: 800; width:100%;">FUSIONNER LES MI-TEMPS</button></div>`;
        container.innerHTML = html;
    }

    window.processSelectedMatches = async function() {
        const selected = document.querySelectorAll('.match-checkbox:checked');
        if (selected.length !== 2) { alert("Sélectionnez 2 mi-temps."); return; }
        const m1 = window.tempMatchesData[selected[0].value];
        const m2 = window.tempMatchesData[selected[1].value];
        await fetchMatchDataForState(m1[3].trim(), m2[3].trim());
        alert("Fusion terminée !");
    };

    document.getElementById('match-report-form').onsubmit = async (e) => {
        e.preventDefault();
        if (!discordAuthCode) { alert("Veuillez vous connecter à Discord."); return; }
        const btn = document.getElementById('btn-submit');
        btn.disabled = true;
        btn.innerText = "VÉRIFICATION ET ENVOI...";

        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());
        data.action = "match";
        data.discord_code = discordAuthCode;
        data.home = window.homeName;
        data.away = window.awayName;
        data.gid = window.currentGid;
        data.players = currentPlayersData;

        const response = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });
        const res = await response.json();
        if (res.result === "success") {
            alert("Match enregistré avec succès !");
            window.location.href = `info-match.html?home=${encodeURIComponent(window.homeName)}&away=${encodeURIComponent(window.awayName)}&gid=${window.currentGid}`;
        } else {
            alert("Erreur: " + res.message);
            btn.disabled = false;
            btn.innerText = "VALIDER ET ENREGISTRER LE MATCH";
        }
    };

    checkDiscordAuth();
    init();
</script>

      
   

</body>
</html>
