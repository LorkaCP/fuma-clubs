<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUMA CLUBS - PLAYERS DATABASE</title>
   <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>

.fuma-filters {
    display: flex;
    flex-direction: row; /* Aligne les éléments horizontalement */
    flex-wrap: wrap;     /* Permet de passer à la ligne seulement si l'écran est trop petit */
    gap: 15px;           /* Espace entre les menus */
    justify-content: center; /* Centre les menus horizontalement */
    margin-bottom: 30px;
}

/* Ajustement des wrappers de sélection */
.selector-wrapper {
    flex: 1;             /* Permet aux menus de se partager l'espace équitablement */
    min-width: 150px;    /* Empêche les menus de devenir trop étroits */
    max-width: 250px;    /* Évite que les menus ne deviennent trop larges sur grand écran */
}

/* Force le select à prendre toute la largeur de son wrapper */
.selector-wrapper .fuma-search-input {
    width: 100%;
    margin-top: 5px;     /* Espace entre le label "Season/Team" et le menu */
}
 </style>
   
</head>
<body>

<div class="fuma-wrapper">
    <nav class="fuma-nav" id="main-nav"></nav>

    <header class="fuma-hero" style="padding: 40px 20px; text-align: center;">
        <h1 class="fuma-hero-subtitle">Players Database</h1>
        <p style="color: var(--fuma-text-dim); max-width: 600px; margin: 0 auto 20px auto;">
            Find all players from the FUMA community. Check stats, archetypes, and scout new recruits for your club.
        </p>
        
        <a href="#" id="btn-my-profile" class="fuma-cta">
            <i class="fas fa-user-circle"></i> MY PROFILE
        </a>
    </header>

   <div class="fuma-container">
    <div class="fuma-filters-container">
        <div class="fuma-filters">

            <div class="selector-wrapper">
    <span class="selector-label">Search Player</span>
    <div style="position: relative;">
        <input type="text" id="search-player" class="fuma-search-input" placeholder="Type a name..." style="padding-left: 35px;">
        <i class="fas fa-search" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--fuma-text-dim);"></i>
    </div>
</div>
            
            <div class="selector-wrapper">
                <span class="selector-label">Season</span>
                <select id="filter-season" class="fuma-search-input">
                    <option value="2074996595">Season 1</option>
                    <option value="1996803561">Season 2</option>
                </select>
            </div>
            
            <div class="selector-wrapper">
                <span class="selector-label">Team</span>
                <select id="filter-team" class="fuma-search-input">
                    <option value="">All Teams</option>
                </select>
            </div>
            
            <div class="selector-wrapper">
                <span class="selector-label">Position</span>
                <select id="filter-position" class="fuma-search-input">
                    <option value="">All Positions</option>
                    <option value="GK">Goalkeeper (GK)</option>
                    <option value="DEF">Defender (DEF)</option>
                    <option value="MID">Midfielder (MID)</option>
                    <option value="ATT">Forward (ATT)</option>
                </select>
            </div>

        </div>
    </div>

    <div class="fuma-club-grid" id="fuma-js-players"></div>
</div>

    <div class="fuma-club-grid" id="fuma-js-players"></div>
</div>

    <footer class="fuma-credits" style="text-align: center; padding: 40px 20px; color: var(--fuma-text-dim); font-size: 0.8rem;">
        &copy; 2026 FUMA CLUBS | ALL RIGHTS RESERVED
    </footer>

    <button class="back-to-top" id="backTop" title="Go to top">↑</button>
</div>

<script src="script.js"></script>

</body>
</html>
