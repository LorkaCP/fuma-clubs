<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUMA CLUBS - RULES</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    
    <style>
        .fuma-maintenance {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            text-align: center;
            padding: 20px;
        }

        .maintenance-icon {
            font-size: 4rem;
            color: var(--fuma-primary);
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        .maintenance-title {
            font-size: 2rem;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .maintenance-text {
            color: var(--fuma-text-dim);
            max-width: 600px;
            line-height: 1.6;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        .status-badge {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--fuma-primary);
            color: var(--fuma-primary);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-top: 20px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="fuma-wrapper">
    <nav class="fuma-nav" id="main-nav"></nav>

    <div class="fuma-container">
        <section class="fuma-maintenance">
            <div class="maintenance-icon">
                <i class="fas fa-tools"></i>
            </div>
            <h1 class="maintenance-title">Under Development</h1>
            <p class="maintenance-text">
                Our team is currently drafting the official 11vs11 Full Manual regulations to ensure the fairest and most competitive experience.
            </p>
            <div class="status-badge">
                <i class="fas fa-clock"></i> Coming Soon
            </div>
        </section>

        <footer class="fuma-footer">
            <div class="fuma-credits">
                &copy; 2026 FUMA CLUBS | ALL RIGHTS RESERVED
            </div>
            <div class="fuma-social-links">
                <a href="https://discord.com/invite/xPz9FBkdtm" target="_blank" class="social-icon">
                    <i class="fab fa-discord"></i>
                </a>
                <a href="https://www.youtube.com/@Fuma-Clubs/videos" target="_blank" class="social-icon">
                    <i class="fab fa-youtube"></i>
                </a>
            </div>
        </footer>
    </div>
</div>

<button class="back-to-top" id="backTop" title="Go to top">↑</button>

<script src="script.js"></script>
</body>
</html>
