<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détails du Match - FUMA CLUBS</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
   <style>
    :root {
        --fuma-primary: #d4af37;
        --fuma-bg-card: #1a1a1a;
        --fuma-bg-dark: #0f0f0f;
        --fuma-border: 1px solid rgba(255,255,255,0.1);
        --fuma-text-dim: #aaa;
        --home-color: #d4af37;
        --away-color: #444;
    }

    /* Tabs System */
    .match-tabs {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin: 20px 0;
        border-bottom: var(--fuma-border);
    }
    .tab-btn {
        background: none;
        border: none;
        color: var(--fuma-text-dim);
        padding: 10px 20px;
        font-weight: 600;
        cursor: pointer;
        text-transform: uppercase;
        font-size: 0.8rem;
    }
    .tab-btn.active {
        color: var(--fuma-primary);
        border-bottom: 2px solid var(--fuma-primary);
    }

    /* Player Stats Table */
    .players-section { display: none; }
    .players-section.active { display: block; }
    
    .team-players-container {
        background: var(--fuma-bg-card);
        border-radius: 15px;
        margin-bottom: 20px;
        overflow: hidden;
    }
    .team-header-stat {
        background: rgba(255,255,255,0.03);
        padding: 10px 15px;
        font-weight: 800;
        font-size: 0.8rem;
        color: var(--fuma-primary);
        border-bottom: var(--fuma-border);
    }
    
    .player-row {
        display: grid;
        grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
        padding: 12px 15px;
        border-bottom: var(--fuma-border);
        font-size: 0.8rem;
        align-items: center;
    }
    .player-row:last-child { border: none; }
    .p-note { 
        background: var(--fuma-primary); 
        color: #000; 
        padding: 2px 6px; 
        border-radius: 4px; 
        font-weight: 800;
        text-align: center;
        width: 30px;
    }
    .p-name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Top Players Highlight */
    .top-performers {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 20px;
    }
    .top-card {
        background: var(--fuma-bg-card);
        padding: 15px;
        border-radius: 12px;
        text-align: center;
        border: 1px solid rgba(212,175,55,0.2);
    }
</style>

<div class="match-tabs">
    <button class="tab-btn active" onclick="switchTab('team-stats')">Équipe</button>
    <button class="tab-btn" onclick="switchTab('player-stats')">Joueurs</button>
</div>

<div id="team-stats" class="tab-content stats-container active">
    </div>

<div id="player-stats" class="tab-content players-section">
    <div class="top-performers" id="top-performers">
        </div>
    
    <div class="team-players-container">
        <div class="team-header-stat" id="team-name-home-stats">DOMICILE</div>
        <div id="list-players-home"></div>
    </div>

    <div class="team-players-container">
        <div class="team-header-stat" id="team-name-away-stats">EXTÉRIEUR</div>
        <div id="list-players-away"></div>
    </div>
</div>

    <script src="info-match-logic.js"></script>
</body>
</html>
