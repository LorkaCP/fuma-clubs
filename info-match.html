<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUMA CLUBS - Match Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
        
    <style>
       
  /* --- LAYOUT --- */
/* Conteneur principal */
.fuma-wrapper {
    background: radial-gradient(circle at 50% 0%, #1e2126 0%, var(--fuma-bg-dark) 70%);
}

/* Header du match (Score & Équipes) */
.match-header {
    background: rgba(20, 22, 25, 0.8) !important;
    backdrop-filter: blur(10px);
    border-bottom: 2px solid var(--fuma-primary) !important;
    border-radius: 0 0 20px 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    margin-bottom: 30px;
}

.team-block h1 {
    color: var(--fuma-primary) !important;
    font-weight: 800;
    letter-spacing: 1px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
}

/* Score */
.score-display {
    color: var(--fuma-text-main);
    font-family: 'Poppins', sans-serif;
}

.score-display span[style*="color: var(--fuma-gold)"] {
    color: var(--fuma-primary) !important; /* Force l'usage de la variable */
    animation: pulse 2s infinite;
}

/* Navigation par onglets */
.match-nav {
    background: var(--fuma-bg-card);
    padding: 10px;
    border-radius: 50px;
    display: inline-flex;
    margin: 0 auto 30px;
    border: var(--fuma-border);
}

.tab-btn {
    border: none !important;
    border-radius: 40px !important;
    color: var(--fuma-text-dim) !important;
    font-size: 0.8rem;
    padding: 12px 25px !important;
    transition: all 0.3s ease !important;
}

.tab-btn.active {
    background: var(--fuma-primary) !important;
    color: #000 !important;
    box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
}

/* Statistiques d'équipe */
.fuma-stats-container {
    background: var(--fuma-bg-card) !important;
    border: var(--fuma-border) !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

.fuma-selector-label {
    color: var(--fuma-primary) !important;
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
}

.fuma-progress-wrapper {
    background: rgba(255, 255, 255, 0.05) !important;
    height: 6px !important;
    border-radius: 3px !important;
}

.fuma-bar-home {
    background: linear-gradient(90deg, #b8932d, var(--fuma-primary)) !important;
}

/* Tableaux des joueurs */
.team-players {
    background: var(--fuma-bg-card) !important;
    border: var(--fuma-border) !important;
}

.player-header {
    background: rgba(212, 175, 55, 0.05);
    color: var(--fuma-primary);
    font-weight: 700;
    border-bottom: 1px solid var(--fuma-primary) !important;
}

.player-row {
    border-bottom: 1px solid rgba(255, 255, 255, 0.03) !important;
    transition: background 0.2s;
}

.player-row:hover {
    background: rgba(255, 255, 255, 0.02);
}

/* Pastilles de note (Ratings) */
.p-note {
    border-radius: 4px !important;
    background: #2a2a2a !important;
    border: 1px solid rgba(255,255,255,0.1);
}

/* Badge MOTM */
.motm-badge {
    background: var(--fuma-primary) !important;
    color: #000 !important;
    font-size: 0.6rem !important;
    letter-spacing: 1px;
    box-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
}

/* Animations */
@keyframes pulse {
    0% { opacity: 1; }
    50% { opacity: 0.5; }
    100% { opacity: 1; }
}
    </style>
</head>
<body>
    <div class="fuma-wrapper">
    <nav class="fuma-nav" id="main-nav"></nav>
    
   <div style="margin-top: 35px;">
        <button id="btn-back-fixtures" style="background: none; border: 1px solid var(--fuma-text-dim); color: var(--fuma-text-dim); padding: 8px 15px; border-radius: 5px; cursor: pointer; font-family: 'Poppins', sans-serif; font-size: 0.8rem; transition: 0.3s;">
            <i class="fas fa-arrow-left"></i> BACK TO FIXTURES
        </button>
    </div>
    
    <div id="loader-container">
        <div class="loader"></div>
        <p style="color: var(--fuma-gold); font-weight: 600;">LOADING DATA...</p>
    </div>

    <div id="main-content" style="display:none;">
        
        <div class="match-header">
            <div class="team-block">
                <img id="logo-home" src="" alt="">
                <h1 id="name-home">HOME</h1>
                <div id="strikers-home" class="strikers"></div>
            </div>
            
            <div class="score-block">
                <div class="score-display">
                    <span id="score-home">0</span>
                    <span style="color: var(--fuma-gold)">:</span>
                    <span id="score-away">0</span>
                </div>
                <div id="motm-container"></div>
            </div>

            <div class="team-block">
                <img id="logo-away" src="" alt="">
                <h1 id="name-away">AWAY</h1>
                <div id="strikers-away" class="strikers"></div>
            </div>
        </div>

        <div class="match-nav" id="match-nav">
            <button class="tab-btn active" onclick="switchTab('resume')">SUMMARY</button>
            <button class="tab-btn" onclick="switchTab('joueurs')">PLAYERS</button>
        </div>

        <div id="resume" class="tab-content">
    <div id="strikers-container" class="strikers-wrapper">
        <div id="strikers-home" class="strikers-list"></div>
        <div id="strikers-away" class="strikers-list"></div>
    </div>

    <div class="fuma-stats-container">
        <h3 class="fuma-sidebar-title" style="text-align: center; margin-bottom: 25px;">Team Statistics</h3>
        
        <div class="fuma-stat-group">
            <div class="fuma-stat-labels">
                <span id="val-possession-home" class="stat-value">0%</span>
                <span class="fuma-selector-label">Possession</span>
                <span id="val-possession-away" class="stat-value">0%</span>
            </div>
            <div class="fuma-progress-wrapper">
                <div id="bar-possession-home" class="fuma-bar-home"></div>
                <div id="bar-possession-away" class="fuma-bar-away"></div>
            </div>
        </div>

        <div class="fuma-stat-group">
            <div class="fuma-stat-labels">
                <span id="val-shots-home" class="stat-value">0</span>
                <span class="fuma-selector-label">Shots</span>
                <span id="val-shots-away" class="stat-value">0</span>
            </div>
            <div class="fuma-progress-wrapper">
                <div id="bar-shots-home" class="fuma-bar-home"></div>
                <div id="bar-shots-away" class="fuma-bar-away"></div>
            </div>
        </div>

        <div class="fuma-stat-group">
            <div class="fuma-stat-labels">
                <span id="val-passes-home" class="stat-value">0 (0%)</span>
                <span class="fuma-selector-label">Pass Accuracy</span>
                <span id="val-passes-away" class="stat-value">0 (0%)</span>
            </div>
            <div class="fuma-progress-wrapper">
                <div id="bar-passes-home" class="fuma-bar-home"></div>
                <div id="bar-passes-away" class="fuma-bar-away"></div>
            </div>
        </div>

        <div class="fuma-stat-group">
            <div class="fuma-stat-labels">
                <span id="val-tackles-home" class="stat-value">0/0</span>
                <span class="fuma-selector-label">Tackles</span>
                <span id="val-tackles-away" class="stat-value">0/0</span>
            </div>
            <div class="fuma-progress-wrapper">
                <div id="bar-tackles-home" class="fuma-bar-home"></div>
                <div id="bar-tackles-away" class="fuma-bar-away"></div>
            </div>
        </div>
    </div>
</div>

        <div id="joueurs" class="tab-content">
            <div class="players-grid">
                <div class="team-players">
                    <h3 id="title-home" class="team-title-stats">-</h3>
                    <div class="player-header">
                        <span>NAME (POS)</span>
                        <span>RTG</span>
                        <span>GLS</span>
                        <span>AST</span>
                        <span>PAS</span>
                        <span>TKL</span>
                    </div>
                    <div id="list-players-home"></div>
                </div>
                <div class="team-players">
                    <h3 id="title-away" class="team-title-stats">-</h3>
                    <div class="player-header">
                        <span>NAME (POS)</span>
                        <span>RTG</span>
                        <span>GLS</span>
                        <span>AST</span>
                        <span>PAS</span>
                        <span>TKL</span>
                    </div>
                    <div id="list-players-away"></div>
                </div>
            </div>
        </div>

        <div id="upcoming-section" style="display:none; text-align:center; padding: 60px 20px;">
            <i class="fa-regular fa-calendar-check" style="font-size: 3rem; color: var(--fuma-gold); margin-bottom: 20px;"></i>
            <p style="margin-bottom: 30px;">THIS MATCH HAS NOT BEEN PLAYED YET.</p>
            
            <button id="btn-send-report" class="tab-btn active" style="padding: 15px 40px; font-size: 1rem;">
                <i class="fas fa-plus-circle"></i> SEND REPORT
            </button>
        </div>
    </div>

   <script src="script.js"></script> 
   <script src="info-match-logic.js"></script>
</body>
</html>
