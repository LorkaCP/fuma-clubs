<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUMA CLUBS - Match Center</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loader-container">
        <div class="loader"></div>
        <p>Chargement des statistiques...</p>
    </div>

    <div id="main-content" style="display:none;">
        <div class="match-header">
            <div class="team-block">
                <img id="logo-home" src="" alt="">
                <h1 id="name-home">-</h1>
                <div id="strikers-home" class="strikers"></div>
            </div>
            
            <div class="score-block">
                <div class="score-display">
                    <span id="score-home">0</span>
                    <span>-</span>
                    <span id="score-away">0</span>
                </div>
                <div id="motm-container"></div>
            </div>

            <div class="team-block">
                <img id="logo-away" src="" alt="">
                <h1 id="name-away">-</h1>
                <div id="strikers-away" class="strikers"></div>
            </div>
        </div>

        <div class="match-nav" id="match-nav">
            <button class="tab-btn active" onclick="switchTab('resume')">RÉSUMÉ</button>
            <button class="tab-btn" onclick="switchTab('joueurs')">JOUEURS</button>
        </div>

        <div id="resume" class="tab-content active">
            <div class="stats-container">
                <div class="stat-row">
                    <div class="stat-label">
                        <span id="val-possession-home">50%</span>
                        <span>POSSESSION</span>
                        <span id="val-possession-away">50%</span>
                    </div>
                    <div class="progress-container">
                        <div id="bar-possession-home" class="bar-home" style="width: 50%"></div>
                        <div id="bar-possession-away" class="bar-away" style="width: 50%"></div>
                    </div>
                </div>

                <div class="stat-row">
                    <div class="stat-label">
                        <span id="val-shots-home">0</span>
                        <span>TIRS</span>
                        <span id="val-shots-away">0</span>
                    </div>
                    <div class="progress-container">
                        <div id="bar-shots-home" class="bar-home" style="width: 50%"></div>
                        <div id="bar-shots-away" class="bar-away" style="width: 50%"></div>
                    </div>
                </div>

                <div class="stat-row">
                    <div class="stat-label">
                        <span id="val-passes-home">0 (0%)</span>
                        <span>PASSES (PRÉC.)</span>
                        <span id="val-passes-away">0 (0%)</span>
                    </div>
                    <div class="progress-container">
                        <div id="bar-passes-home" class="bar-home" style="width: 50%"></div>
                        <div id="bar-passes-away" class="bar-away" style="width: 50%"></div>
                    </div>
                </div>

                <div class="stat-row">
                    <div class="stat-label">
                        <span id="val-tackles-home">0/0</span>
                        <span>TACLES RÉUSSIS</span>
                        <span id="val-tackles-away">0/0</span>
                    </div>
                    <div class="progress-container">
                        <div id="bar-tackles-home" class="bar-home" style="width: 50%"></div>
                        <div id="bar-tackles-away" class="bar-away" style="width: 50%"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="joueurs" class="tab-content">
            <div class="players-grid">
                <div class="team-players">
                    <h3 id="title-home" class="team-title-stats">Equipe Domicile</h3>
                    <div class="player-header">
                        <span>NOM</span><span>NOTE</span><span>BUT</span><span>PAS%</span><span>TAC%</span>
                    </div>
                    <div id="list-players-home"></div>
                </div>
                <div class="team-players">
                    <h3 id="title-away" class="team-title-stats">Equipe Extérieure</h3>
                    <div class="player-header">
                        <span>NOM</span><span>NOTE</span><span>BUT</span><span>PAS%</span><span>TAC%</span>
                    </div>
                    <div id="list-players-away"></div>
                </div>
            </div>
        </div>

        <div id="upcoming-section" style="display:none; text-align:center; padding: 50px;">
            <p>Ce match n'a pas encore été joué.</p>
        </div>
    </div>

    <script src="info-match-logic.js"></script>
</body>
</html>
