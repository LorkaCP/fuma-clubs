<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUMA CLUBS - Match Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --fuma-gold: #d4af37;
            --fuma-bg: #0b0b0b;
            --fuma-card: #1a1a1a;
            --fuma-text: #ffffff;
            --fuma-text-dim: #aaaaaa;
        }

        body {
            background-color: var(--fuma-bg);
            color: var(--fuma-text);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* --- HEADER & SCORE --- */
       /* --- HEADER & SCORE --- */

        
        .match-header {
    display: flex;
    justify-content: center; /* Centre le bloc entier */
    align-items: flex-start; /* Aligne les blocs équipes et score par le haut */
    padding: 40px 20px;
    background: linear-gradient(180deg, #1a1a1a 0%, #000000 100%);
    border-bottom: 1px solid rgba(212, 175, 55, 0.2);
    gap: 20px;
}

.team-block { 
    display: flex;
    flex-direction: column;
    align-items: center; 
    width: 35%; 
    min-height: 180px; /* Force une hauteur minimum pour stabiliser l'ensemble */
}

.team-block img { 
    width: 80px; 
    height: 80px; 
    object-fit: contain; 
    margin-bottom: 15px;
    /* Assure que même si l'image est petite, elle occupe le même espace */
    display: block;
}

.team-block h1 { 
    font-size: 1.2rem; 
    margin: 0; 
    color: var(--fuma-gold); 
    text-transform: uppercase;
    text-align: center;
    line-height: 1.2;
}

.score-block { 
    flex: 1; /* Prend l'espace central de manière égale */
    text-align: center; 
    padding-top: 10px; /* Ajuste la hauteur du score par rapport aux logos */
}

        .score-block { text-align: center; }
        .score-display {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: 5px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .score-loser {
    opacity: 0.4; /* Grise le score */
    font-weight: 400; /* Optionnel : rend l'écriture moins grasse */
}

        .strikers { font-size: 0.75rem; color: var(--fuma-text-dim); margin-top: 10px; line-height: 1.4; }
        .motm-badge {
            background: var(--fuma-gold);
            color: #000;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 800;
            margin-top: 15px;
            display: inline-block;
            text-transform: uppercase;
        }

        /* --- NAVIGATION --- */
        .match-nav {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 25px 0;
        }

        .tab-btn {
            background: none;
            border: 1px solid #333;
            color: var(--fuma-text-dim);
            padding: 10px 30px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            border-radius: 4px;
        }

        .tab-btn.active {
            background: var(--fuma-gold);
            color: #000;
            border-color: var(--fuma-gold);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        /* --- CONTENU --- */
        .tab-content { display: none; padding: 0 20px 50px; }
        .tab-content.active { display: block; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- STATS RESUME --- */
        .stats-container { max-width: 700px; margin: 0 auto; background: var(--fuma-card); padding: 30px; border-radius: 12px; }
        .match-stat-row { margin-bottom: 30px; }
        .stat-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--fuma-text-dim);
        }
        .stat-title { color: var(--fuma-gold); letter-spacing: 1px; }

        .progress-container {
            display: flex;
            height: 10px;
            background: #000;
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid #222;
        }

        .bar-home { background: var(--fuma-gold); width: 50%; transition: width 1s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
        .bar-away { background: #ffffff; width: 50%; transition: width 1s cubic-bezier(0.17, 0.67, 0.83, 0.67); }

        /* --- GRILLE JOUEURS --- */
        .players-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .team-players { background: var(--fuma-card); border-radius: 10px; padding: 15px; }
        .team-title-stats { 
            color: var(--fuma-gold); 
            text-align: center; 
            margin-bottom: 15px; 
            font-size: 1rem;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

  /* --- TABLEAU DES JOUEURS OPTIMISÉ --- */
.player-header, .player-row {
    display: grid;
    grid-template-columns: 3.5fr 0.8fr 0.6fr 0.6fr 0.7fr 0.6fr; 
    align-items: center;
    gap: 2px;
    padding: 10px 5px;
    /* --- AJUSTEMENTS ICI --- */
    font-size: 0.72rem; /* Réduit de 0.75 à 0.7 */
    font-weight: 400;  /* Écriture plus fine par défaut */
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

/* On aligne à gauche uniquement la première colonne (Nom) */
.player-header span:first-child, 
.player-row div:first-child {
    text-align: left;
    padding-left: 5px;
}

/* On centre toutes les autres colonnes (de la 2ème à la 6ème) */
.player-header span:not(:first-child),
.player-row div:not(:first-child) {
    text-align: center;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Sécurité pour le nom s'il est trop long */
.player-row div:first-child {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}
.p-note {
    width: 28px;
    height: 20px;
    line-height: 20px;
    border-radius: 4px;
    text-align: center;
    font-weight: bold;
    color: #fff;
    margin: 0 auto;
}
        /* --- LOADER --- */
        #loader-container { text-align: center; padding-top: 150px; height: 100vh; background: #000; }
        .loader {
            border: 3px solid #1a1a1a;
            border-top: 3px solid var(--fuma-gold);
            border-radius: 50%;
            width: 50px; height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Mobile */
        @media (max-width: 768px) {
            .players-grid { grid-template-columns: 1fr; }
            .score-display { font-size: 2.2rem; }
            .match-header { flex-direction: column; gap: 20px; }
            .team-block { width: 100%; }
        }

/* --- OPTIMISATION DU HEADER MOBILE --- */
@media (max-width: 600px) {
    .match-header {
        display: flex !important;
        flex-direction: row !important; /* Force l'alignement horizontal */
        justify-content: space-between;
        align-items: center;
        padding: 20px 10px !important;
        gap: 5px !important;
    }

    .team-block {
        width: 30% !important;
        min-height: auto !important;
    }

    .team-block img {
        width: 50px !important;
        height: 50px !important;
        margin-bottom: 8px;
    }

    .team-block h1 {
        font-size: 0.75rem !important;
        white-space: normal;
        max-width: 80px;
    }

    .score-block {
        flex: 1;
        padding-top: 0;
    }

    .score-display {
        font-size: 1.8rem !important; /* Score plus compact */
        gap: 8px;
        letter-spacing: 2px;
    }

    .strikers {
        display: none; /* Masqués sur mobile pour gagner de l'espace, ou passez en font-size ultra réduit */
    }

    .motm-badge {
        font-size: 0.55rem !important;
        padding: 3px 8px !important;
        white-space: nowrap;
    }
}
        
    </style>
</head>
<body>
<div class="fuma-wrapper">
    <nav class="fuma-nav" id="main-nav"></nav>
           </div>
    
    <div style="padding: 20px 20px 0 20px;">
        <button id="btn-back-fixtures" style="background: none; border: 1px solid var(--fuma-text-dim); color: var(--fuma-text-dim); padding: 8px 15px; border-radius: 5px; cursor: pointer; font-family: 'Poppins', sans-serif; font-size: 0.8rem; transition: 0.3s;">
            <i class="fas fa-arrow-left"></i> BACK TO FIXTURES
        </button>
    </div>
    
    <div id="loader-container">
        <div class="loader"></div>
        <p style="color: var(--fuma-gold); font-weight: 600;">LOADING DATA...</p>
    </div>

    <div id="main-content" style="display:none;">
        
       <div id="resume" class="tab-content active">
    <div class="stats-container">
        
        <div class="stat-card-box">
            <div class="stat-label">
                <span id="val-possession-home">50%</span>
                <span class="stat-title">POSSESSION</span>
                <span id="val-possession-away">50%</span>
            </div>
            <div class="progress-container">
                <div id="bar-possession-home" class="bar-home"></div>
                <div id="bar-possession-away" class="bar-away"></div>
            </div>
        </div>

        <div class="stat-card-box">
            <div class="stat-label">
                <span id="val-shots-home">0</span>
                <span class="stat-title">SHOTS</span>
                <span id="val-shots-away">0</span>
            </div>
            <div class="progress-container">
                <div id="bar-shots-home" class="bar-home"></div>
                <div id="bar-shots-away" class="bar-away"></div>
            </div>
        </div>

        <div class="stat-card-box">
            <div class="stat-label">
                <span id="val-passes-home">0 (0%)</span>
                <span class="stat-title">PASSES</span>
                <span id="val-passes-away">0 (0%)</span>
            </div>
            <div class="progress-container">
                <div id="bar-passes-home" class="bar-home"></div>
                <div id="bar-passes-away" class="bar-away"></div>
            </div>
        </div>

    </div>
</div>
        <div id="joueurs" class="tab-content">
            <div class="players-grid">
                <div class="team-players">
                    <h3 id="title-home" class="team-title-stats">-</h3>
                    <div class="player-header">
                        <span>NAME (POS)</span>
                        <span>RTG</span>
                        <span>GLS</span>
                        <span>AST</span>
                        <span>PAS</span>
                        <span>TKL</span>
                    </div>
                    <div id="list-players-home"></div>
                </div>
                <div class="team-players">
                    <h3 id="title-away" class="team-title-stats">-</h3>
                    <div class="player-header">
                        <span>NAME (POS)</span>
                        <span>RTG</span>
                        <span>GLS</span>
                        <span>AST</span>
                        <span>PAS</span>
                        <span>TKL</span>
                    </div>
                    <div id="list-players-away"></div>
                </div>
            </div>
        </div>

        <div id="upcoming-section" style="display:none; text-align:center; padding: 60px 20px;">
            <i class="fa-regular fa-calendar-check" style="font-size: 3rem; color: var(--fuma-gold); margin-bottom: 20px;"></i>
            <p style="margin-bottom: 30px;">THIS MATCH HAS NOT BEEN PLAYED YET.</p>
            
            <button id="btn-send-report" class="tab-btn active" style="padding: 15px 40px; font-size: 1rem;">
                <i class="fas fa-plus-circle"></i> SEND REPORT
            </button>
        </div>
    </div>

   <script src="script.js"></script> 
   <script src="info-match-logic.js"></script>
</body>
</html>
