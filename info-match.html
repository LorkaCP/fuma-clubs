<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUMA CLUBS - Match Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
        
    <style>
        :root {
    --fuma-gold: #d4af37;
    --fuma-bg: #0b0b0b;
    --fuma-card: #1a1a1a;
    --fuma-text: #ffffff;
    --fuma-text-dim: #aaaaaa;
    --fuma-border: 1px solid rgba(212, 175, 55, 0.2);
}

body {
    background-color: var(--fuma-bg);
    color: var(--fuma-text);
    font-family: 'Poppins', sans-serif;
    margin: 0;
    line-height: 1.6;
}

/* --- LAYOUT --- */
.fuma-wrapper {
    max-width: 1000px;
    margin: 0 auto;
    padding-bottom: 50px;
}

/* --- HEADER & SCORE --- */
.match-header {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 20px;
    background: linear-gradient(180deg, #1a1a1a 0%, #000000 100%);
    border-bottom: var(--fuma-border);
    gap: 20px;
}

.team-block { 
    display: flex;
    flex-direction: column;
    align-items: center; 
    width: 35%; 
    text-align: center;
}

.team-block img { 
    width: 80px; 
    height: 80px; 
    object-fit: contain; 
    margin-bottom: 15px;
}

.team-block h1 { 
    font-size: 1.2rem; 
    margin: 0; 
    color: var(--fuma-gold); 
    text-transform: uppercase;
}

.score-display {
    font-size: 3.5rem;
    font-weight: 800;
    letter-spacing: 5px;
    display: flex;
    gap: 15px;
    justify-content: center;
}

.score-loser { opacity: 0.4; font-weight: 400; }

.strikers { 
    font-size: 0.75rem; 
    color: var(--fuma-text-dim); 
    margin-top: 10px; 
}

.motm-badge {
    background: var(--fuma-gold);
    color: #000;
    padding: 5px 15px;
    border-radius: 20px;
    font-size: 0.7rem;
    font-weight: 800;
    margin-top: 15px;
    display: inline-block;
    text-transform: uppercase;
}

/* --- NAVIGATION TABS --- */
.match-nav {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 25px 0;
}

.tab-btn {
    background: none;
    border: 1px solid #333;
    color: var(--fuma-text-dim);
    padding: 10px 30px;
    cursor: pointer;
    font-weight: 600;
    border-radius: 4px;
    transition: 0.3s;
}

.tab-btn.active {
    background: var(--fuma-gold);
    color: #000;
    border-color: var(--fuma-gold);
    box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
}

/* --- STATS TEAM --- */
.fuma-stats-container {
    background: var(--fuma-card);
    border-radius: 12px;
    padding: 30px 20px;
    margin: 20px;
}

.fuma-stat-group { margin-bottom: 25px; }

.fuma-stat-labels {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
}

.stat-value { font-weight: 800; font-size: 1.1rem; }

.fuma-progress-wrapper {
    display: flex;
    height: 8px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 10px;
    overflow: hidden;
}

.fuma-bar-home { background: var(--fuma-gold); transition: width 1s ease; }
.fuma-bar-away { background: var(--fuma-text-dim); transition: width 1s ease; }

/* --- PLAYERS GRID & ROWS --- */
.players-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.team-players { background: var(--fuma-card); border-radius: 10px; padding: 15px; }

.player-header, .player-row {
    display: grid;
    grid-template-columns: 3.5fr 0.8fr 0.6fr 0.6fr 0.7fr 0.6fr; 
    font-size: 0.72rem;
    padding: 10px 5px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    align-items: center;
}

.player-header { font-weight: 600; color: var(--fuma-gold); }

.p-note {
    background: #333;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: bold;
    text-align: center;
}

/* --- UPCOMING MATCH SECTION (Nouveau) --- */
#upcoming-section {
    background: var(--fuma-card);
    margin: 20px;
    border-radius: 12px;
    border: 1px dashed var(--fuma-gold);
}

/* --- LOADER --- */
#loader-container { 
    text-align: center; 
    padding-top: 100px; 
    height: 60vh; 
}

.loader {
    border: 3px solid #1a1a1a;
    border-top: 3px solid var(--fuma-gold);
    border-radius: 50%;
    width: 40px; height: 40px;
    animation: spin 1s linear infinite;
    margin: 0 auto 20px;
}

@keyframes spin { 100% { transform: rotate(360deg); } }

/* --- RESPONSIVE --- */
@media (max-width: 768px) {
    .players-grid { grid-template-columns: 1fr; }
    .match-header { padding: 20px 10px; }
    .team-block img { width: 50px; height: 50px; }
    .score-display { font-size: 2rem; }
    .team-block h1 { font-size: 0.8rem; }
}
        
    </style>
</head>
<body>
    <div class="fuma-wrapper">
    <nav class="fuma-nav" id="main-nav"></nav>
    
    <div style="padding: 20px 20px 0 20px;">
        <button id="btn-back-fixtures" style="background: none; border: 1px solid var(--fuma-text-dim); color: var(--fuma-text-dim); padding: 8px 15px; border-radius: 5px; cursor: pointer; font-family: 'Poppins', sans-serif; font-size: 0.8rem; transition: 0.3s;">
            <i class="fas fa-arrow-left"></i> BACK TO FIXTURES
        </button>
    </div>
    
    <div id="loader-container">
        <div class="loader"></div>
        <p style="color: var(--fuma-gold); font-weight: 600;">LOADING DATA...</p>
    </div>

    <div id="main-content" style="display:none;">
        
        <div class="match-header">
            <div class="team-block">
                <img id="logo-home" src="" alt="">
                <h1 id="name-home">HOME</h1>
                <div id="strikers-home" class="strikers"></div>
            </div>
            
            <div class="score-block">
                <div class="score-display">
                    <span id="score-home">0</span>
                    <span style="color: var(--fuma-gold)">:</span>
                    <span id="score-away">0</span>
                </div>
                <div id="motm-container"></div>
            </div>

            <div class="team-block">
                <img id="logo-away" src="" alt="">
                <h1 id="name-away">AWAY</h1>
                <div id="strikers-away" class="strikers"></div>
            </div>
        </div>

        <div class="match-nav" id="match-nav">
            <button class="tab-btn active" onclick="switchTab('resume')">SUMMARY</button>
            <button class="tab-btn" onclick="switchTab('joueurs')">PLAYERS</button>
        </div>

        <div id="resume" class="tab-content">
    <div id="strikers-container" class="strikers-wrapper">
        <div id="strikers-home" class="strikers-list"></div>
        <div id="strikers-away" class="strikers-list"></div>
    </div>

    <div class="fuma-stats-container">
        <h3 class="fuma-sidebar-title" style="text-align: center; margin-bottom: 25px;">Team Statistics</h3>
        
        <div class="fuma-stat-group">
            <div class="fuma-stat-labels">
                <span id="val-possession-home" class="stat-value">0%</span>
                <span class="fuma-selector-label">Possession</span>
                <span id="val-possession-away" class="stat-value">0%</span>
            </div>
            <div class="fuma-progress-wrapper">
                <div id="bar-possession-home" class="fuma-bar-home"></div>
                <div id="bar-possession-away" class="fuma-bar-away"></div>
            </div>
        </div>

        <div class="fuma-stat-group">
            <div class="fuma-stat-labels">
                <span id="val-shots-home" class="stat-value">0</span>
                <span class="fuma-selector-label">Shots</span>
                <span id="val-shots-away" class="stat-value">0</span>
            </div>
            <div class="fuma-progress-wrapper">
                <div id="bar-shots-home" class="fuma-bar-home"></div>
                <div id="bar-shots-away" class="fuma-bar-away"></div>
            </div>
        </div>

        <div class="fuma-stat-group">
            <div class="fuma-stat-labels">
                <span id="val-passes-home" class="stat-value">0 (0%)</span>
                <span class="fuma-selector-label">Pass Accuracy</span>
                <span id="val-passes-away" class="stat-value">0 (0%)</span>
            </div>
            <div class="fuma-progress-wrapper">
                <div id="bar-passes-home" class="fuma-bar-home"></div>
                <div id="bar-passes-away" class="fuma-bar-away"></div>
            </div>
        </div>

        <div class="fuma-stat-group">
            <div class="fuma-stat-labels">
                <span id="val-tackles-home" class="stat-value">0/0</span>
                <span class="fuma-selector-label">Tackles</span>
                <span id="val-tackles-away" class="stat-value">0/0</span>
            </div>
            <div class="fuma-progress-wrapper">
                <div id="bar-tackles-home" class="fuma-bar-home"></div>
                <div id="bar-tackles-away" class="fuma-bar-away"></div>
            </div>
        </div>
    </div>
</div>

        <div id="joueurs" class="tab-content">
            <div class="players-grid">
                <div class="team-players">
                    <h3 id="title-home" class="team-title-stats">-</h3>
                    <div class="player-header">
                        <span>NAME (POS)</span>
                        <span>RTG</span>
                        <span>GLS</span>
                        <span>AST</span>
                        <span>PAS</span>
                        <span>TKL</span>
                    </div>
                    <div id="list-players-home"></div>
                </div>
                <div class="team-players">
                    <h3 id="title-away" class="team-title-stats">-</h3>
                    <div class="player-header">
                        <span>NAME (POS)</span>
                        <span>RTG</span>
                        <span>GLS</span>
                        <span>AST</span>
                        <span>PAS</span>
                        <span>TKL</span>
                    </div>
                    <div id="list-players-away"></div>
                </div>
            </div>
        </div>

        <div id="upcoming-section" style="display:none; text-align:center; padding: 60px 20px;">
            <i class="fa-regular fa-calendar-check" style="font-size: 3rem; color: var(--fuma-gold); margin-bottom: 20px;"></i>
            <p style="margin-bottom: 30px;">THIS MATCH HAS NOT BEEN PLAYED YET.</p>
            
            <button id="btn-send-report" class="tab-btn active" style="padding: 15px 40px; font-size: 1rem;">
                <i class="fas fa-plus-circle"></i> SEND REPORT
            </button>
        </div>
    </div>

   <script src="script.js"></script> 
   <script src="info-match-logic.js"></script>
</body>
</html>
