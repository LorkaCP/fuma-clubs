<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détails du Match - FUMA CLUBS</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --fuma-primary: #d4af37;
            --fuma-bg-card: #1a1a1a;
            --fuma-border: 1px solid rgba(255,255,255,0.1);
            --fuma-text-dim: #aaa;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding-bottom: 50px;
        }

        /* --- LOADER --- */
        #loader-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; align-items: center; justify-content: center; z-index: 9999;
        }

        /* --- HEADER --- */
        .match-header {
            background: linear-gradient(to bottom, #1a1a1a, #000);
            padding: 30px 15px; text-align: center; border-bottom: var(--fuma-border);
        }
        .score-row { display: flex; align-items: center; justify-content: center; gap: 20px; }
        .team-box { flex: 1; display: flex; flex-direction: column; align-items: center; }
        .team-logo { width: 70px; height: 70px; object-fit: contain; margin-bottom: 10px; }
        .team-name { font-weight: 800; font-size: 0.9rem; text-transform: uppercase; }
        .score-display { font-size: 3rem; font-weight: 800; letter-spacing: -2px; min-width: 80px; }

        /* --- NAVIGATION TABS --- */
        .match-tabs {
            display: none; /* Masqué si non joué */
            justify-content: center; background: #000; border-bottom: var(--fuma-border);
        }
        .tab-btn {
            background: none; border: none; color: var(--fuma-text-dim);
            padding: 15px 20px; font-weight: 600; font-size: 0.8rem; cursor: pointer;
        }
        .tab-btn.active { color: var(--fuma-primary); border-bottom: 3px solid var(--fuma-primary); }

        /* --- MESSAGE MATCH NON PUBLIÉ --- */
        .upcoming-container {
            display: none; /* Affiché via JS */
            text-align: center; padding: 40px 20px;
        }
        .info-card {
            background: var(--fuma-bg-card); border-radius: 12px; padding: 30px;
            border: 1px solid rgba(212, 175, 55, 0.1);
        }
        .status-badge {
            background: #333; color: var(--fuma-primary); padding: 5px 15px;
            border-radius: 20px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase;
        }
        .btn-report {
            display: inline-block; margin-top: 25px; background: var(--fuma-primary);
            color: #000; padding: 12px 25px; border-radius: 6px; font-weight: 800;
            text-decoration: none; text-transform: uppercase; font-size: 0.85rem;
        }

        /* --- STATS SECTIONS --- */
        .fuma-container { max-width: 600px; margin: auto; padding: 20px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* Player Stats Table Style */
        .player-row {
            display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
            padding: 12px 10px; border-bottom: var(--fuma-border); font-size: 0.8rem; align-items: center;
        }
        .p-note { width: 30px; height: 22px; display: flex; align-items: center; justify-content: center; border-radius: 4px; color: #000; font-weight: 800; margin: auto; }
    </style>
</head>
<body>

    <div id="loader-container">
        <div class="fuma-loader"></div>
    </div>

    <div id="main-content" style="display:none;">
        
        <header class="match-header">
            <div class="score-row">
                <div class="team-box">
                    <img id="logo-home" class="team-logo" src="" alt="">
                    <span id="name-home" class="team-name">-</span>
                </div>
                <div class="score-display">
                    <span id="score-home">-</span> : <span id="score-away">-</span>
                </div>
                <div class="team-box">
                    <img id="logo-away" class="team-logo" src="" alt="">
                    <span id="name-away" class="team-name">-</span>
                </div>
            </div>
            <div id="strikers-container" class="strikers-container" style="display:none; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px; font-size: 0.75rem; color: var(--fuma-text-dim);">
                <div id="strikers-home" style="text-align: right;"></div>
                <div id="strikers-away" style="text-align: left;"></div>
            </div>
        </header>

        <div id="upcoming-section" class="fuma-container upcoming-container">
            <div class="info-card">
                <span class="status-badge">En attente</span>
                <h3 style="margin: 15px 0 10px 0; font-weight: 800;">Résultats non publiés</h3>
                <p style="color: var(--fuma-text-dim); font-size: 0.85rem; line-height: 1.5;">
                    Les statistiques de ce match n'ont pas encore été enregistrées par les capitaines.
                </p>
                <a id="btn-report-link" href="#" class="btn-report">
                    <i class="fas fa-file-signature"></i> Report Match Data
                </a>
            </div>
        </div>

        <nav class="match-tabs" id="match-nav">
            <button class="tab-btn active" onclick="switchTab('team-stats')">Résumé</button>
            <button class="tab-btn" onclick="switchTab('player-stats')">Joueurs</button>
        </nav>

        <div id="played-content" class="fuma-container" style="display:none;">
            <div id="team-stats" class="tab-content active">
                </div>

            <div id="player-stats" class="tab-content">
                <div style="color: var(--fuma-primary); font-weight: 800; margin-bottom: 10px;" id="title-home"></div>
                <div id="list-players-home"></div>
                <div style="color: var(--fuma-primary); font-weight: 800; margin-top: 20px; margin-bottom: 10px;" id="title-away"></div>
                <div id="list-players-away"></div>
            </div>
        </div>

    </div>

    <script src="info-match-logic.js"></script>
</body>
</html>
