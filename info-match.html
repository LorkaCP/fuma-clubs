<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUMA CLUBS - Match Center</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
<style>
:root {
    --fuma-gold: #d4af37;
    --fuma-bg: #0b0b0b;
    --fuma-card: #1a1a1a;
    --fuma-text: #ffffff;
    --fuma-text-dim: #aaaaaa;
}

body {
    background-color: var(--fuma-bg);
    color: var(--fuma-text);
    font-family: 'Poppins', sans-serif;
    margin: 0;
}

/* Header */
.match-header {
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 40px 20px;
    background: linear-gradient(180deg, #1a1a1a 0%, #000000 100%);
    border-bottom: 1px solid rgba(212, 175, 55, 0.2);
}

.team-block { text-align: center; width: 30%; }
.team-block img { width: 80px; height: 80px; object-fit: contain; margin-bottom: 10px; }
.team-block h1 { font-size: 1.2rem; margin: 0; color: var(--fuma-gold); }

.score-display {
    font-size: 3rem;
    font-weight: 800;
    letter-spacing: 5px;
}

.strikers { font-size: 0.75rem; color: var(--fuma-text-dim); margin-top: 10px; }

/* Onglets */
.match-nav {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 20px 0;
}

.tab-btn {
    background: none;
    border: 1px solid #333;
    color: var(--fuma-text-dim);
    padding: 10px 25px;
    cursor: pointer;
    font-weight: 600;
    transition: 0.3s;
}

.tab-btn.active {
    background: var(--fuma-gold);
    color: #000;
    border-color: var(--fuma-gold);
}

.tab-content { display: none; padding: 0 20px; }
.tab-content.active { display: block; }

/* Barres de stats */
.stats-container { max-width: 600px; margin: 0 auto; }
.stat-row { margin-bottom: 25px; }
.stat-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--fuma-text-dim);
}

.progress-container {
    display: flex;
    height: 8px;
    background: #333;
    border-radius: 4px;
    overflow: hidden;
}

.bar-home { background: var(--fuma-gold); transition: width 1s ease-in-out; }
.bar-away { background: #eee; transition: width 1s ease-in-out; }

/* Grille Joueurs */
.players-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    max-width: 1000px;
    margin: 0 auto;
}

.player-header {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
    font-size: 0.65rem;
    color: var(--fuma-gold);
    padding: 10px;
    border-bottom: 1px solid #333;
}

.player-row {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
    align-items: center;
    padding: 12px 10px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 0.85rem;
}

.p-note {
    text-align: center;
    border-radius: 4px;
    color: #000;
    font-weight: 800;
    padding: 2px 0;
}

.motm-badge {
    background: var(--fuma-gold);
    color: #000;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 0.7rem;
    font-weight: 800;
    margin-top: 10px;
    display: inline-block;
}

/* Loader */
#loader-container { text-align: center; padding-top: 100px; }
.loader {
    border: 4px solid #1a1a1a;
    border-top: 4px solid var(--fuma-gold);
    border-radius: 50%;
    width: 40px; height: 40px;
    animation: spin 1s linear infinite;
    margin: 0 auto 20px;
}
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

@media (max-width: 768px) {
    .players-grid { grid-template-columns: 1fr; }
    .score-display { font-size: 2rem; }
}

<style>    
</head>
<body>

    <div id="loader-container">
        <div class="loader"></div>
        <p>Chargement des statistiques...</p>
    </div>

    <div id="main-content" style="display:none;">
        <div class="match-header">
            <div class="team-block">
                <img id="logo-home" src="" alt="">
                <h1 id="name-home">-</h1>
                <div id="strikers-home" class="strikers"></div>
            </div>
            
            <div class="score-block">
                <div class="score-display">
                    <span id="score-home">0</span>
                    <span>-</span>
                    <span id="score-away">0</span>
                </div>
                <div id="motm-container"></div>
            </div>

            <div class="team-block">
                <img id="logo-away" src="" alt="">
                <h1 id="name-away">-</h1>
                <div id="strikers-away" class="strikers"></div>
            </div>
        </div>

        <div class="match-nav" id="match-nav">
            <button class="tab-btn active" onclick="switchTab('resume')">RÉSUMÉ</button>
            <button class="tab-btn" onclick="switchTab('joueurs')">JOUEURS</button>
        </div>

        <div id="resume" class="tab-content active">
            <div class="stats-container">
                <div class="stat-row">
                    <div class="stat-label">
                        <span id="val-possession-home">50%</span>
                        <span>POSSESSION</span>
                        <span id="val-possession-away">50%</span>
                    </div>
                    <div class="progress-container">
                        <div id="bar-possession-home" class="bar-home" style="width: 50%"></div>
                        <div id="bar-possession-away" class="bar-away" style="width: 50%"></div>
                    </div>
                </div>

                <div class="stat-row">
                    <div class="stat-label">
                        <span id="val-shots-home">0</span>
                        <span>TIRS</span>
                        <span id="val-shots-away">0</span>
                    </div>
                    <div class="progress-container">
                        <div id="bar-shots-home" class="bar-home" style="width: 50%"></div>
                        <div id="bar-shots-away" class="bar-away" style="width: 50%"></div>
                    </div>
                </div>

                <div class="stat-row">
                    <div class="stat-label">
                        <span id="val-passes-home">0 (0%)</span>
                        <span>PASSES (PRÉC.)</span>
                        <span id="val-passes-away">0 (0%)</span>
                    </div>
                    <div class="progress-container">
                        <div id="bar-passes-home" class="bar-home" style="width: 50%"></div>
                        <div id="bar-passes-away" class="bar-away" style="width: 50%"></div>
                    </div>
                </div>

                <div class="stat-row">
                    <div class="stat-label">
                        <span id="val-tackles-home">0/0</span>
                        <span>TACLES RÉUSSIS</span>
                        <span id="val-tackles-away">0/0</span>
                    </div>
                    <div class="progress-container">
                        <div id="bar-tackles-home" class="bar-home" style="width: 50%"></div>
                        <div id="bar-tackles-away" class="bar-away" style="width: 50%"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="joueurs" class="tab-content">
            <div class="players-grid">
                <div class="team-players">
                    <h3 id="title-home" class="team-title-stats">Equipe Domicile</h3>
                    <div class="player-header">
                        <span>NOM</span><span>NOTE</span><span>BUT</span><span>PAS%</span><span>TAC%</span>
                    </div>
                    <div id="list-players-home"></div>
                </div>
                <div class="team-players">
                    <h3 id="title-away" class="team-title-stats">Equipe Extérieure</h3>
                    <div class="player-header">
                        <span>NOM</span><span>NOTE</span><span>BUT</span><span>PAS%</span><span>TAC%</span>
                    </div>
                    <div id="list-players-away"></div>
                </div>
            </div>
        </div>

        <div id="upcoming-section" style="display:none; text-align:center; padding: 50px;">
            <p>Ce match n'a pas encore été joué.</p>
        </div>
    </div>

    <script src="info-match-logic.js"></script>
</body>
</html>
